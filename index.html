<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestPro - Smart Investments</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); }
        .nav-active { border-bottom: 3px solid #3b82f6; }
        .modal { animation: modalPop 0.3s ease; }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="min-h-screen flex">
        <!-- Sidebar -->
        <div id="sidebar" class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col hidden md:flex">
            <div class="p-6 border-b border-zinc-800">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-bold text-2xl">IP</div>
                    <div>
                        <h1 class="text-2xl font-bold tracking-tight">InvestPro</h1>
                        <p class="text-xs text-zinc-500">Secure • Fast • Rewarding</p>
                    </div>
                </div>
            </div>
            
            <div id="user-menu" class="flex-1 px-4 py-6 space-y-1">
                <!-- Populated by JS -->
            </div>
            
            <div id="admin-menu" class="flex-1 px-4 py-6 space-y-1 hidden">
                <!-- Populated by JS -->
            </div>
            
            <div class="p-4 border-t border-zinc-800">
                <div onclick="logout()" class="flex items-center gap-3 text-red-400 hover:bg-zinc-800 p-3 rounded-2xl cursor-pointer">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span class="font-medium">Logout</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col">
            <!-- Top Nav -->
            <nav class="bg-zinc-900 border-b border-zinc-800 px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="md:hidden text-2xl">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <h2 id="page-title" class="text-2xl font-semibold">Dashboard</h2>
                </div>
                
                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-2 bg-zinc-800 rounded-3xl px-4 py-2 text-sm">
                        <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                        <span id="balance-display" class="font-mono font-semibold">$0.00</span>
                    </div>
                    
                    <div class="flex items-center gap-3">
                        <div id="user-avatar" onclick="showProfileModal()" 
                             class="w-9 h-9 bg-blue-600 rounded-2xl flex items-center justify-center font-bold cursor-pointer">
                        </div>
                        <div>
                            <div id="username-display" class="font-semibold text-sm"></div>
                            <div id="role-display" class="text-xs text-zinc-500"></div>
                        </div>
                    </div>
                </div>
            </nav>

            <!-- Content Area -->
            <div class="flex-1 p-8 overflow-auto" id="main-content">
                <!-- Dynamic content loaded here by JS -->
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="glass w-full max-w-md mx-4 rounded-3xl p-8 shadow-2xl modal">
            <div class="text-center mb-8">
                <div class="mx-auto w-16 h-16 bg-blue-600 rounded-3xl flex items-center justify-center text-4xl mb-4">IP</div>
                <h2 class="text-3xl font-bold">Welcome Back</h2>
                <p class="text-zinc-400">Sign in to access your account</p>
            </div>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-sm mb-2">Email / Username</label>
                    <input id="login-email" type="text" value="demo@user.com" 
                           class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm mb-2">Password</label>
                    <input id="login-password" type="password" value="123456" 
                           class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500">
                </div>
                
                <div class="flex gap-3">
                    <button onclick="loginAs('user')" 
                            class="flex-1 bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-semibold transition">
                        Login as User
                    </button>
                    <button onclick="loginAs('admin')" 
                            class="flex-1 bg-amber-600 hover:bg-amber-700 py-4 rounded-2xl font-semibold transition">
                        Login as Admin
                    </button>
                </div>
                
                <div class="text-center text-xs text-zinc-500">
                    Demo credentials pre-filled. Password: 123456
                </div>
            </div>
        </div>
    </div>

    <!-- Deposit Modal -->
    <div id="deposit-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="glass w-full max-w-lg mx-4 rounded-3xl p-8 modal">
            <h3 class="text-2xl font-bold mb-6">Make a Deposit</h3>
            <div class="space-y-6">
                <div>
                    <label class="block text-sm mb-2">Amount (₦)</label>
                    <input id="deposit-amount" type="number" value="50000" 
                           class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
                </div>
                <button onclick="initiateMonnifyDeposit()" 
                        class="w-full bg-emerald-600 hover:bg-emerald-700 py-4 rounded-2xl font-semibold flex items-center justify-center gap-2">
                    <i class="fa-solid fa-credit-card"></i>
                    Pay with Monnify
                </button>
                <div class="text-xs text-center text-zinc-500">
                    Secure payment powered by Monnify
                </div>
            </div>
            <button onclick="hideModal('deposit-modal')" 
                    class="mt-6 text-zinc-400 hover:text-white w-full py-3">Cancel</button>
        </div>
    </div>

    <!-- Withdraw Modal -->
    <div id="withdraw-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="glass w-full max-w-lg mx-4 rounded-3xl p-8 modal">
            <h3 class="text-2xl font-bold mb-6">Request Withdrawal</h3>
            <div class="space-y-6">
                <div>
                    <label class="block text-sm mb-2">Amount (₦)</label>
                    <input id="withdraw-amount" type="number" value="20000" 
                           class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
                </div>
                <button onclick="requestWithdrawal()" 
                        class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-semibold">
                    Submit Withdrawal Request
                </button>
            </div>
            <button onclick="hideModal('withdraw-modal')" 
                    class="mt-6 text-zinc-400 hover:text-white w-full py-3">Cancel</button>
        </div>
    </div>

    <!-- Admin Create User Modal -->
    <div id="create-user-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="glass w-full max-w-md mx-4 rounded-3xl p-8 modal">
            <h3 class="text-2xl font-bold mb-6">Create New User</h3>
            <div class="space-y-4">
                <input id="new-username" placeholder="Username" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
                <input id="new-email" placeholder="Email" type="email" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
                <input id="new-password" placeholder="Password" type="password" value="123456" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
                <button onclick="createNewUser()" class="w-full bg-violet-600 py-4 rounded-2xl font-semibold">Create Account</button>
            </div>
            <button onclick="hideModal('create-user-modal')" class="mt-6 text-zinc-400 hover:text-white w-full py-3">Cancel</button>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profile-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="glass w-full max-w-sm mx-4 rounded-3xl p-8 modal">
            <div class="flex justify-center mb-6">
                <div id="modal-avatar" class="w-24 h-24 bg-blue-600 rounded-3xl flex items-center justify-center text-5xl font-bold"></div>
            </div>
            <h3 id="modal-username" class="text-center text-2xl font-bold mb-1"></h3>
            <p id="modal-email" class="text-center text-zinc-400 mb-8"></p>
            
            <div onclick="resetOwnPassword()" class="flex items-center justify-between p-4 hover:bg-zinc-800 rounded-2xl cursor-pointer">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-key text-amber-400"></i>
                    <span>Reset Password</span>
                </div>
            </div>
            
            <button onclick="hideModal('profile-modal')" 
                    class="mt-8 w-full py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl">Close</button>
        </div>
    </div>

    <script>
        // Tailwind script already loaded via CDN
        
        let currentUser = null;
        let users = [
            {
                id: 1,
                username: "demo_user",
                email: "demo@user.com",
                password: "123456",
                balance: 125000,
                role: "user",
                createdAt: "2025-11-12 14:30",
                referrer: null,
                referrals: 3,
                frozen: false
            },
            {
                id: 2,
                username: "john_invest",
                email: "john@example.com",
                password: "123456",
                balance: 45000,
                role: "user",
                createdAt: "2025-12-01 09:15",
                referrer: 1,
                referrals: 0,
                frozen: false
            }
        ];
        
        let transactions = [
            { id: 1, userId: 1, type: "deposit", amount: 100000, date: "2026-06-20 10:45", status: "completed" },
            { id: 2, userId: 1, type: "referral", amount: 10000, date: "2026-06-18 16:22", status: "completed" }
        ];
        
        let withdrawalRequests = [];
        
        // Monnify simulation
        function initiateMonnifyDeposit() {
            const amount = parseFloat(document.getElementById('deposit-amount').value);
            if (!amount || amount < 1000) {
                alert("Minimum deposit is ₦1,000");
                return;
            }
            
            hideModal('deposit-modal');
            
            // Simulate payment success
            setTimeout(() => {
                const user = users.find(u => u.id === currentUser.id);
                if (user) {
                    user.balance += amount;
                    transactions.push({
                        id: Date.now(),
                        userId: user.id,
                        type: "deposit",
                        amount: amount,
                        date: new Date().toISOString().slice(0,16).replace('T',' '),
                        status: "completed"
                    });
                    
                    // Give 20% referral bonus to referrer if first deposit
                    if (user.referrer) {
                        const referrer = users.find(u => u.id === user.referrer);
                        if (referrer) {
                            const bonus = amount * 0.20;
                            referrer.balance += bonus;
                            transactions.push({
                                id: Date.now() + 1,
                                userId: referrer.id,
                                type: "referral",
                                amount: bonus,
                                date: new Date().toISOString().slice(0,16).replace('T',' '),
                                status: "completed"
                            });
                        }
                    }
                    
                    alert(`Deposit of ₦${amount.toLocaleString()} successful! Balance updated.`);
                    renderCurrentPage();
                }
            }, 1500);
        }
        
        function requestWithdrawal() {
            const amount = parseFloat(document.getElementById('withdraw-amount').value);
            const user = users.find(u => u.id === currentUser.id);
            
            if (!user || amount > user.balance) {
                alert("Insufficient balance!");
                return;
            }
            
            withdrawalRequests.push({
                id: Date.now(),
                userId: user.id,
                amount: amount,
                status: "pending",
                date: new Date().toISOString().slice(0,16).replace('T',' ')
            });
            
            hideModal('withdraw-modal');
            alert("Withdrawal request submitted. Awaiting admin approval.");
            renderCurrentPage();
        }
        
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('hidden');
        }
        
        function showPage(page) {
            const content = document.getElementById('main-content');
            document.getElementById('page-title').textContent = page.charAt(0).toUpperCase() + page.slice(1);
            
            if (page === 'dashboard') {
                content.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-zinc-900 rounded-3xl p-6">
                            <div class="flex justify-between">
                                <div>
                                    <p class="text-zinc-400 text-sm">Total Balance</p>
                                    <p id="dash-balance" class="text-4xl font-bold mt-2">₦${currentUser.balance.toLocaleString()}</p>
                                </div>
                                <i class="fa-solid fa-wallet text-4xl text-blue-500"></i>
                            </div>
                        </div>
                        
                        <div class="bg-zinc-900 rounded-3xl p-6">
                            <div class="flex justify-between">
                                <div>
                                    <p class="text-zinc-400 text-sm">Referrals</p>
                                    <p class="text-4xl font-bold mt-2">${currentUser.referrals || 0}</p>
                                </div>
                                <i class="fa-solid fa-users text-4xl text-emerald-500"></i>
                            </div>
                        </div>
                        
                        <div class="bg-zinc-900 rounded-3xl p-6">
                            <div class="flex justify-between">
                                <div>
                                    <p class="text-zinc-400 text-sm">Total Earned</p>
                                    <p class="text-4xl font-bold mt-2">₦${(currentUser.balance * 0.3).toFixed(0)}</p>
                                </div>
                                <i class="fa-solid fa-chart-line text-4xl text-amber-500"></i>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-8 bg-zinc-900 rounded-3xl p-6">
                        <h3 class="font-semibold mb-4 flex items-center gap-2">
                            <i class="fa-solid fa-clock"></i> Recent Transactions
                        </h3>
                        <div id="recent-transactions" class="space-y-4"></div>
                    </div>
                    
                    <div class="mt-6 bg-zinc-900 rounded-3xl p-8 text-center">
                        <p class="text-lg mb-4">Your Referral Link</p>
                        <div class="bg-zinc-800 p-4 rounded-2xl font-mono text-sm break-all">
                            https://investpro.com/ref/${currentUser.username}
                        </div>
                        <button onclick="copyReferralLink()" class="mt-4 px-8 py-3 bg-white text-zinc-900 rounded-2xl font-semibold">Copy Link</button>
                    </div>
                `;
                renderRecentTransactions();
            } 
            else if (page === 'deposit') {
                document.getElementById('deposit-modal').classList.remove('hidden');
            } 
            else if (page === 'withdraw') {
                document.getElementById('withdraw-modal').classList.remove('hidden');
            } 
            else if (page === 'referrals' && currentUser.role === 'user') {
                content.innerHTML = `
                    <div class="max-w-2xl mx-auto bg-zinc-900 rounded-3xl p-8">
                        <h3 class="text-xl font-semibold mb-6">Your Referrals</h3>
                        <div class="space-y-4" id="referral-list"></div>
                    </div>
                `;
                renderReferrals();
            } 
            else if (page === 'admin' && currentUser.role === 'admin') {
                renderAdminDashboard();
            }
        }
        
        function renderRecentTransactions() {
            const container = document.getElementById('recent-transactions');
            const userTx = transactions.filter(t => t.userId === currentUser.id).slice(0, 5);
            
            if (userTx.length === 0) {
                container.innerHTML = `<p class="text-zinc-500 text-center py-8">No transactions yet</p>`;
                return;
            }
            
            let html = '';
            userTx.forEach(tx => {
                const color = tx.type === 'deposit' ? 'text-emerald-400' : 'text-amber-400';
                html += `
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <div class="w-9 h-9 bg-zinc-800 rounded-2xl flex items-center justify-center ${color}">
                                <i class="fa-solid ${tx.type === 'deposit' ? 'fa-arrow-down' : 'fa-gift'}"></i>
                            </div>
                            <div>
                                <p class="font-medium">${tx.type.toUpperCase()}</p>
                                <p class="text-xs text-zinc-500">${tx.date}</p>
                            </div>
                        </div>
                        <p class="${color} font-semibold">+₦${tx.amount.toLocaleString()}</p>
                    </div>
                `;
            });
            container.innerHTML = html;
        }
        
        function renderReferrals() {
            const container = document.getElementById('referral-list');
            const myReferrals = users.filter(u => u.referrer === currentUser.id);
            
            if (myReferrals.length === 0) {
                container.innerHTML = `<p class="text-zinc-400">You haven't referred anyone yet.</p>`;
                return;
            }
            
            let html = '';
            myReferrals.forEach(ref => {
                html += `
                    <div class="flex justify-between items-center border border-zinc-700 p-4 rounded-2xl">
                        <div>
                            <p class="font-medium">${ref.username}</p>
                            <p class="text-xs text-zinc-500">${ref.email}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-emerald-400">Joined ${ref.createdAt}</p>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }
        
        function renderAdminDashboard() {
            const content = document.getElementById('main-content');
            let html = `
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-2xl font-bold">Admin Dashboard</h3>
                    <button onclick="showCreateUserModal()" 
                            class="bg-violet-600 px-6 py-3 rounded-2xl flex items-center gap-2">
                        <i class="fa-solid fa-plus"></i> Create User
                    </button>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                    <div class="bg-zinc-900 rounded-3xl p-6">
                        <p class="text-zinc-400">Total Users</p>
                        <p class="text-5xl font-bold mt-2">${users.length}</p>
                    </div>
                    <div class="bg-zinc-900 rounded-3xl p-6">
                        <p class="text-zinc-400">Pending Withdrawals</p>
                        <p class="text-5xl font-bold mt-2 text-amber-400">${withdrawalRequests.length}</p>
                    </div>
                </div>
                
                <div class="bg-zinc-900 rounded-3xl overflow-hidden">
                    <table class="w-full">
                        <thead>
                            <tr class="border-b border-zinc-800">
                                <th class="text-left p-6">User</th>
                                <th class="text-left p-6">Email</th>
                                <th class="text-left p-6">Balance</th>
                                <th class="text-left p-6">Joined</th>
                                <th class="text-left p-6">Referrals</th>
                                <th class="p-6 text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-users-table"></tbody>
                    </table>
                </div>
            `;
            content.innerHTML = html;
            renderAdminUsersTable();
        }
        
        function renderAdminUsersTable() {
            const tbody = document.getElementById('admin-users-table');
            let html = '';
            
            users.forEach(user => {
                html += `
                    <tr class="border-b border-zinc-800 hover:bg-zinc-800/50">
                        <td class="p-6 font-medium">${user.username}</td>
                        <td class="p-6 text-zinc-400">${user.email}</td>
                        <td class="p-6 font-mono">₦${user.balance.toLocaleString()}</td>
                        <td class="p-6 text-sm text-zinc-500">${user.createdAt}</td>
                        <td class="p-6">${user.referrals || 0}</td>
                        <td class="p-6">
                            <div class="flex gap-2 justify-center">
                                <button onclick="adminAddFunds(${user.id})" class="text-xs bg-emerald-900 hover:bg-emerald-800 px-4 py-2 rounded-xl">+ Fund</button>
                                <button onclick="adminDeductFunds(${user.id})" class="text-xs bg-amber-900 hover:bg-amber-800 px-4 py-2 rounded-xl">- Deduct</button>
                                <button onclick="toggleFreeze(${user.id})" class="text-xs ${user.frozen ? 'bg-red-900' : 'bg-zinc-700'} px-4 py-2 rounded-xl">
                                    ${user.frozen ? 'Unfreeze' : 'Freeze'}
                                </button>
                                <button onclick="deleteUser(${user.id})" class="text-xs bg-red-900 hover:bg-red-800 px-4 py-2 rounded-xl">Delete</button>
                                <button onclick="adminResetPassword(${user.id})" class="text-xs bg-blue-900 hover:bg-blue-800 px-4 py-2 rounded-xl">Reset PW</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }
        
        function adminAddFunds(id) {
            const amt = prompt("Enter amount to add (₦):", "50000");
            if (amt) {
                const user = users.find(u => u.id === id);
                if (user) {
                    user.balance += parseFloat(amt);
                    alert(`Added ₦${amt} to ${user.username}`);
                    renderAdminUsersTable();
                }
            }
        }
        
        function adminDeductFunds(id) {
            const amt = prompt("Enter amount to deduct (₦):", "10000");
            if (amt) {
                const user = users.find(u => u.id === id);
                if (user) {
                    user.balance = Math.max(0, user.balance - parseFloat(amt));
                    alert(`Deducted ₦${amt} from ${user.username}`);
                    renderAdminUsersTable();
                }
            }
        }
        
        function toggleFreeze(id) {
            const user = users.find(u => u.id === id);
            if (user) {
                user.frozen = !user.frozen;
                alert(`${user.username} ${user.frozen ? 'frozen' : 'unfrozen'}`);
                renderAdminUsersTable();
            }
        }
        
        function deleteUser(id) {
            if (confirm("Delete this user permanently?")) {
                users = users.filter(u => u.id !== id);
                alert("User deleted");
                renderAdminUsersTable();
            }
        }
        
        function adminResetPassword(id) {
            const user = users.find(u => u.id === id);
            if (user) {
                const newPass = prompt("Enter new password for " + user.username, "123456");
                if (newPass) {
                    user.password = newPass;
                    alert("Password reset successfully");
                }
            }
        }
        
        function showCreateUserModal() {
            document.getElementById('create-user-modal').classList.remove('hidden');
        }
        
        function createNewUser() {
            const username = document.getElementById('new-username').value;
            const email = document.getElementById('new-email').value;
            const password = document.getElementById('new-password').value;
            
            if (!username || !email) {
                alert("Username and email required");
                return;
            }
            
            const newUser = {
                id: Date.now(),
                username: username,
                email: email,
                password: password || "123456",
                balance: 0,
                role: "user",
                createdAt: new Date().toISOString().slice(0,16).replace('T',' '),
                referrer: null,
                referrals: 0,
                frozen: false
            };
            
            users.push(newUser);
            hideModal('create-user-modal');
            alert("User created successfully");
            renderAdminUsersTable();
        }
        
        function hideModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
        }
        
        function copyReferralLink() {
            const link = `https://investpro.com/ref/${currentUser.username}`;
            navigator.clipboard.writeText(link).then(() => {
                alert("Referral link copied!");
            });
        }
        
        function loginAs(role) {
            const email = document.getElementById('login-email').value;
            
            if (role === 'admin') {
                currentUser = {
                    id: 999,
                    username: "admin",
                    email: "admin@investpro.com",
                    role: "admin",
                    balance: 0,
                    referrals: 0
                };
            } else {
                currentUser = users[0]; // demo user
            }
            
            document.getElementById('login-modal').style.display = 'none';
            document.getElementById('username-display').textContent = currentUser.username;
            document.getElementById('role-display').textContent = currentUser.role.toUpperCase();
            document.getElementById('user-avatar').textContent = currentUser.username[0].toUpperCase();
            document.getElementById('balance-display').textContent = `₦${currentUser.balance.toLocaleString()}`;
            
            // Show correct menu
            if (currentUser.role === 'admin') {
                document.getElementById('user-menu').classList.add('hidden');
                document.getElementById('admin-menu').classList.remove('hidden');
                renderAdminMenu();
                showPage('admin');
            } else {
                document.getElementById('user-menu').classList.remove('hidden');
                document.getElementById('admin-menu').classList.add('hidden');
                renderUserMenu();
                showPage('dashboard');
            }
        }
        
        function renderUserMenu() {
            const menu = document.getElementById('user-menu');
            menu.innerHTML = `
                <div onclick="showPage('dashboard')" class="nav-item flex items-center gap-3 px-5 py-4 hover:bg-zinc-800 rounded-2xl cursor-pointer nav-active">
                    <i class="fa-solid fa-house w-5"></i>
                    <span class="font-medium">Dashboard</span>
                </div>
                <div onclick="showPage('deposit')" class="nav-item flex items-center gap-3 px-5 py-4 hover:bg-zinc-800 rounded-2xl cursor-pointer">
                    <i class="fa-solid fa-arrow-down w-5"></i>
                    <span class="font-medium">Deposit</span>
                </div>
                <div onclick="showPage('withdraw')" class="nav-item flex items-center gap-3 px-5 py-4 hover:bg-zinc-800 rounded-2xl cursor-pointer">
                    <i class="fa-solid fa-arrow-up w-5"></i>
                    <span class="font-medium">Withdraw</span>
                </div>
                <div onclick="showPage('referrals')" class="nav-item flex items-center gap-3 px-5 py-4 hover:bg-zinc-800 rounded-2xl cursor-pointer">
                    <i class="fa-solid fa-users w-5"></i>
                    <span class="font-medium">My Referrals</span>
                </div>
            `;
        }
        
        function renderAdminMenu() {
            const menu = document.getElementById('admin-menu');
            menu.innerHTML = `
                <div onclick="showPage('admin')" class="flex items-center gap-3 px-5 py-4 hover:bg-zinc-800 rounded-2xl cursor-pointer nav-active">
                    <i class="fa-solid fa-users w-5"></i>
                    <span class="font-medium">All Users</span>
                </div>
                <div onclick="viewWithdrawRequests()" class="flex items-center gap-3 px-5 py-4 hover:bg-zinc-800 rounded-2xl cursor-pointer">
                    <i class="fa-solid fa-hand-holding-dollar w-5"></i>
                    <span class="font-medium">Withdrawals</span>
                </div>
            `;
        }
        
        function viewWithdrawRequests() {
            let html = `<div class="bg-zinc-900 rounded-3xl p-8"><h3 class="font-bold text-xl mb-6">Pending Withdrawals</h3>`;
            
            if (withdrawalRequests.length === 0) {
                html += `<p class="text-zinc-400">No pending requests</p>`;
            } else {
                withdrawalRequests.forEach((req, index) => {
                    const user = users.find(u => u.id === req.userId);
                    html += `
                        <div class="flex justify-between items-center border border-zinc-700 p-5 rounded-2xl mb-4">
                            <div>
                                <p>${user ? user.username : 'Unknown'}</p>
                                <p class="text-sm text-zinc-400">₦${req.amount.toLocaleString()} • ${req.date}</p>
                            </div>
                            <div>
                                <button onclick="approveWithdrawal(${index})" class="bg-emerald-600 px-6 py-3 rounded-2xl text-sm">Approve & Pay</button>
                            </div>
                        </div>
                    `;
                });
            }
            html += `</div>`;
            document.getElementById('main-content').innerHTML = html;
        }
        
        function approveWithdrawal(index) {
            const req = withdrawalRequests[index];
            const user = users.find(u => u.id === req.userId);
            if (user && user.balance >= req.amount) {
                user.balance -= req.amount;
                req.status = "approved";
                alert(`Withdrawal of ₦${req.amount} approved and paid via Monnify`);
                withdrawalRequests.splice(index, 1);
                viewWithdrawRequests();
            }
        }
        
        function showProfileModal() {
            const modal = document.getElementById('profile-modal');
            document.getElementById('modal-avatar').textContent = currentUser.username[0].toUpperCase();
            document.getElementById('modal-username').textContent = currentUser.username;
            document.getElementById('modal-email').textContent = currentUser.email || currentUser.username + "@investpro.com";
            modal.classList.remove('hidden');
        }
        
        function resetOwnPassword() {
            const newPass = prompt("Enter new password:", "123456");
            if (newPass && currentUser) {
                alert("Password changed successfully!");
                hideModal('profile-modal');
            }
        }
        
        function logout() {
            if (confirm("Logout?")) {
                location.reload();
            }
        }
        
        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.metaKey && e.key === "k") {
                e.preventDefault();
                alert("Demo search: Try typing user names");
            }
        });
        
        // Initialize
        window.onload = function() {
            // Auto show login
            // For demo purposes we can auto-login as user
            setTimeout(() => {
                // Uncomment next line for auto login:
                // loginAs('user');
            }, 800);
        };
        
        // Expose some functions to window for onclick handlers
        window.loginAs = loginAs;
        window.showPage = showPage;
        window.hideModal = hideModal;
        window.initiateMonnifyDeposit = initiateMonnifyDeposit;
        window.requestWithdrawal = requestWithdrawal;
        window.copyReferralLink = copyReferralLink;
        window.createNewUser = createNewUser;
        window.showCreateUserModal = showCreateUserModal;
        window.adminAddFunds = adminAddFunds;
        window.adminDeductFunds = adminDeductFunds;
        window.toggleFreeze = toggleFreeze;
        window.deleteUser = deleteUser;
        window.adminResetPassword = adminResetPassword;
        window.logout = logout;
        window.showProfileModal = showProfileModal;
        window.resetOwnPassword = resetOwnPassword;
        window.toggleSidebar = toggleSidebar;
        window.viewWithdrawRequests = viewWithdrawRequests;
        window.approveWithdrawal = approveWithdrawal;
        window.renderCurrentPage = () => showPage('dashboard');
    </script>
</body>
</html>
