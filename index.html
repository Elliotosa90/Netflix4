<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NatureZone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, sans-serif; }
        .admin-dot {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 22px;
            height: 22px;
            background: #f59e0b;
            border: 3px solid white;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10000;
            box-shadow: 0 0 15px #f59e0b;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <div class="flex min-h-screen">
        <div id="sidebar" class="w-72 bg-zinc-900 hidden md:flex flex-col">
            <div class="p-6 border-b border-zinc-800">
                <h1 class="text-2xl font-bold">NatureZone</h1>
            </div>
            <div id="sidebar-menu" class="flex-1 p-4"></div>
        </div>

        <div class="flex-1">
            <nav class="bg-zinc-900 p-6 flex justify-between">
                <h2 id="page-title" class="text-2xl font-bold">Dashboard</h2>
                <div onclick="showProfileModal()" class="cursor-pointer">
                    <div id="user-avatar" class="w-10 h-10 bg-emerald-600 rounded-full flex items-center justify-center font-bold"></div>
                </div>
            </nav>
            <div id="main-content" class="p-8"></div>
        </div>
    </div>

    <!-- Orange Admin Dot -->
    <div onclick="showAdminLogin()" class="admin-dot"></div>

    <!-- Login / Signup Modal -->
    <div id="auth-modal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50">
        <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-md">
            <div class="text-center mb-8">
                <h2 id="auth-title" class="text-3xl font-bold">Welcome to NatureZone</h2>
            </div>

            <!-- Login -->
            <div id="login-form">
                <input id="login-email" placeholder="Email" type="email" class="w-full bg-zinc-800 p-4 rounded-2xl mb-4">
                <input id="login-password" placeholder="Password" type="password" class="w-full bg-zinc-800 p-4 rounded-2xl mb-6">
                <button onclick="login()" class="w-full bg-emerald-600 py-4 rounded-2xl font-bold">LOGIN</button>
                <p onclick="switchToSignup()" class="text-center text-emerald-400 mt-4 cursor-pointer">No account? Sign up</p>
            </div>

            <!-- Signup -->
            <div id="signup-form" class="hidden">
                <input id="signup-username" placeholder="Username" type="text" class="w-full bg-zinc-800 p-4 rounded-2xl mb-4">
                <input id="signup-email" placeholder="Email" type="email" class="w-full bg-zinc-800 p-4 rounded-2xl mb-4">
                <input id="signup-password" placeholder="Password" type="password" class="w-full bg-zinc-800 p-4 rounded-2xl mb-6">
                <button onclick="signup()" class="w-full bg-emerald-600 py-4 rounded-2xl font-bold">CREATE ACCOUNT</button>
                <p onclick="switchToLogin()" class="text-center text-emerald-400 mt-4 cursor-pointer">Back to Login</p>
            </div>
        </div>
    </div>

    <!-- Admin Modal -->
    <div id="admin-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
        <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-sm">
            <h3 class="text-xl font-bold mb-6">Admin Login</h3>
            <input id="admin-pass" type="password" placeholder="Admin Password" class="w-full bg-zinc-800 p-4 rounded-2xl mb-6">
            <button onclick="adminLogin()" class="w-full bg-amber-600 py-4 rounded-2xl font-bold">ENTER ADMIN PANEL</button>
        </div>
    </div>

    <script>
        let currentUser = null;

        function showModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function hideModal(id) { document.getElementById(id).classList.add('hidden'); }

        function switchToSignup() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('signup-form').classList.remove('hidden');
        }

        function switchToLogin() {
            document.getElementById('signup-form').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
        }

        function login() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            if (email && password) {
                currentUser = { username: "Demo User", role: "user", balance: 125000 };
                hideModal('auth-modal');
                initUI();
            } else {
                alert("Please fill email and password");
            }
        }

        function signup() {
            const username = document.getElementById('signup-username').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;

            if (username && email && password) {
                alert("Account created! You can now login.");
                switchToLogin();
            } else {
                alert("Please fill all fields");
            }
        }

        function showAdminLogin() {
            document.getElementById('admin-pass').value = '';
            showModal('admin-modal');
        }

        function adminLogin() {
            if (document.getElementById('admin-pass').value === "admin2026") {
                currentUser = { username: "Admin", role: "admin", balance: 0 };
                hideModal('admin-modal');
                hideModal('auth-modal');
                initUI();
            } else {
                alert("Wrong password");
            }
        }

        function initUI() {
            document.getElementById('username-display').textContent = currentUser.username;
            document.getElementById('user-avatar').textContent = currentUser.username[0];
            showPage(currentUser.role === 'admin' ? 'admin' : 'dashboard');
        }

        function showPage(page) {
            document.getElementById('page-title').textContent = page === 'admin' ? 'Admin Panel' : 'Dashboard';
            document.getElementById('main-content').innerHTML = `<h1 class="text-4xl text-emerald-400 text-center mt-32">Welcome to ${page}</h1>`;
        }

        function showProfileModal() {
            alert(currentUser ? `Logged in as ${currentUser.username}` : "Not logged in");
        }

        window.onload = () => {
            showModal('auth-modal');
        };

        // Make buttons work
        window.login = login;
        window.signup = signup;
        window.switchToSignup = switchToSignup;
        window.switchToLogin = switchToLogin;
        window.showAdminLogin = showAdminLogin;
        window.adminLogin = adminLogin;
        window.showProfileModal = showProfileModal;
    </script>
</body>
</html>
