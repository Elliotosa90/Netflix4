<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestPro - Smart Investments</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); }
        .nav-active { border-bottom: 3px solid #3b82f6; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <div id="sidebar" class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col hidden md:flex">
            <div class="p-6 border-b border-zinc-800 flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-bold text-2xl">IP</div>
                <div>
                    <h1 class="text-2xl font-bold">InvestPro</h1>
                    <p class="text-xs text-zinc-500">Secure Investments</p>
                </div>
            </div>

            <div id="sidebar-menu" class="flex-1 p-4 space-y-1"></div>

            <div class="p-4 border-t border-zinc-800">
                <div onclick="logout()" class="flex items-center gap-3 text-red-400 hover:bg-zinc-800 p-3 rounded-2xl cursor-pointer">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Logout</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col">
            <nav class="bg-zinc-900 border-b border-zinc-800 px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="md:hidden text-2xl"><i class="fa-solid fa-bars"></i></button>
                    <h2 id="page-title" class="text-2xl font-semibold">Dashboard</h2>
                </div>
                
                <div class="flex items-center gap-6">
                    <div class="bg-zinc-800 rounded-3xl px-5 py-2 text-sm font-mono">
                        Balance: <span id="balance-display" class="font-semibold">₦0.00</span>
                    </div>
                    <div onclick="showProfileModal()" class="flex items-center gap-3 cursor-pointer">
                        <div id="user-avatar" class="w-9 h-9 bg-blue-600 rounded-2xl flex items-center justify-center font-bold"></div>
                        <div>
                            <div id="username-display" class="font-semibold text-sm"></div>
                            <div id="role-display" class="text-xs text-zinc-500"></div>
                        </div>
                    </div>
                </div>
            </nav>

            <div class="flex-1 p-6 md:p-8 overflow-auto" id="main-content"></div>
        </div>
    </div>

    <!-- Tiny Admin Login Dot -->
    <div onclick="showHiddenAdminLogin()" 
         class="fixed bottom-2 right-2 w-2 h-2 bg-transparent hover:bg-amber-400 rounded-full cursor-pointer transition-colors z-50"
         title="Admin Access"></div>

    <!-- Login Modal -->
    <div id="login-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-md mx-4">
            <div class="text-center mb-8">
                <div class="mx-auto w-16 h-16 bg-blue-600 rounded-3xl flex items-center justify-center text-4xl mb-4">IP</div>
                <h2 class="text-3xl font-bold">Welcome to InvestPro</h2>
            </div>
            <input id="login-email" placeholder="Email" type="email" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mb-4 focus:outline-none focus:border-blue-500">
            <input id="login-password" placeholder="Password" type="password" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mb-6 focus:outline-none focus:border-blue-500">
            
            <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-semibold">Login</button>
            <p class="text-center text-xs text-zinc-500 mt-4">Don't have an account? Contact support.</p>
        </div>
    </div>

    <!-- Deposit Modal -->
    <div id="deposit-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-md mx-4">
            <h3 class="text-2xl font-bold mb-6">Deposit Funds</h3>
            <input id="deposit-amount" type="number" placeholder="Amount (₦)" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mb-6">
            <button onclick="initiateDeposit()" class="w-full bg-emerald-600 hover:bg-emerald-700 py-4 rounded-2xl font-semibold">Pay with Monnify</button>
            <button onclick="hideModal('deposit-modal')" class="mt-4 w-full text-zinc-400">Cancel</button>
        </div>
    </div>

    <!-- Admin Secret Login Modal -->
    <div id="admin-secret-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-sm mx-4">
            <h3 class="text-xl font-bold mb-6 text-amber-400">Admin Access</h3>
            <input id="admin-secret-pass" type="password" placeholder="Admin Password" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mb-6">
            <button onclick="adminSecretLogin()" class="w-full bg-amber-600 py-4 rounded-2xl">Access Admin Panel</button>
        </div>
    </div>

    <script>
        // ================== SUPABASE CONFIG ==================
        const SUPABASE_URL = 'https://your-project.supabase.co';           // ← CHANGE THIS
        const SUPABASE_ANON_KEY = 'your-anon-key-here';                   // ← CHANGE THIS
        
        const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;

        // ================== UTILITIES ==================
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('hidden');
        }

        function hideModal(id) {
            document.getElementById(id).classList.add('hidden');
        }

        function showPage(page) {
            document.getElementById('page-title').textContent = page === 'admin' ? 'Admin Panel' : page.charAt(0).toUpperCase() + page.slice(1);
            const content = document.getElementById('main-content');

            if (page === 'dashboard') renderDashboard();
            else if (page === 'deposit') document.getElementById('deposit-modal').classList.remove('hidden');
            else if (page === 'withdraw') renderWithdraw();
            else if (page === 'referrals') renderReferrals();
            else if (page === 'admin') renderAdminPanel();
        }

        // ================== AUTH ==================
        async function login() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            if (!email || !password) return alert("Please fill all fields");

            const { data, error } = await supabase
                .from('users')
                .select('*')
                .eq('email', email)
                .eq('password', password) // In production use proper auth + hashing
                .single();

            if (error || !data) {
                alert("Invalid credentials");
                return;
            }

            currentUser = data;
            document.getElementById('login-modal').style.display = 'none';
            initUI();
        }

        function logout() {
            if (confirm("Logout?")) location.reload();
        }

        // Hidden Admin Login
        function showHiddenAdminLogin() {
            document.getElementById('admin-secret-modal').classList.remove('hidden');
        }

        async function adminSecretLogin() {
            const pass = document.getElementById('admin-secret-pass').value;
            if (pass === "admin2026") {  // Change this in production
                const { data } = await supabase.from('users').select('*').eq('role', 'admin').single();
                if (data) {
                    currentUser = data;
                    hideModal('admin-secret-modal');
                    initUI();
                }
            } else {
                alert("Incorrect admin password");
            }
        }

        // ================== UI RENDERING ==================
        function initUI() {
            document.getElementById('username-display').textContent = currentUser.username;
            document.getElementById('role-display').textContent = currentUser.role.toUpperCase();
            document.getElementById('user-avatar').textContent = currentUser.username[0].toUpperCase();
            document.getElementById('balance-display').textContent = `₦${currentUser.balance.toLocaleString()}`;

            const menu = document.getElementById('sidebar-menu');

            if (currentUser.role === 'admin') {
                menu.innerHTML = `
                    <div onclick="showPage('admin')" class="flex items-center gap-3 px-5 py-4 hover:bg-zinc-800 rounded-2xl cursor-pointer nav-active">
                        <i class="fa-solid fa-users"></i><span>Users</span>
                    </div>
                    <div onclick="showPage('withdraw')" class="flex items-center gap-3 px-5 py-4 hover:bg-zinc-800 rounded-2xl cursor-pointer">
                        <i class="fa-solid fa-hand-holding-dollar"></i><span>Withdrawals</span>
                    </div>
                `;
                showPage('admin');
            } else {
                menu.innerHTML = `
                    <div onclick="showPage('dashboard')" class="flex items-center gap-3 px-5 py-4 hover:bg-zinc-800 rounded-2xl cursor-pointer nav-active">
                        <i class="fa-solid fa-house"></i><span>Dashboard</span>
                    </div>
                    <div onclick="showPage('deposit')" class="flex items-center gap-3 px-5 py-4 hover:bg-zinc-800 rounded-2xl cursor-pointer">
                        <i class="fa-solid fa-arrow-down"></i><span>Deposit</span>
                    </div>
                    <div onclick="showPage('withdraw')" class="flex items-center gap-3 px-5 py-4 hover:bg-zinc-800 rounded-2xl cursor-pointer">
                        <i class="fa-solid fa-arrow-up"></i><span>Withdraw</span>
                    </div>
                    <div onclick="showPage('referrals')" class="flex items-center gap-3 px-5 py-4 hover:bg-zinc-800 rounded-2xl cursor-pointer">
                        <i class="fa-solid fa-users"></i><span>Referrals</span>
                    </div>
                `;
                showPage('dashboard');
            }
        }

        async function renderDashboard() {
            const { data: txs } = await supabase.from('transactions').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false }).limit(6);
            
            let html = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-zinc-900 rounded-3xl p-6">
                        <p class="text-zinc-400">Balance</p>
                        <p class="text-5xl font-bold mt-2">₦${currentUser.balance.toLocaleString()}</p>
                    </div>
                    <div class="bg-zinc-900 rounded-3xl p-6">
                        <p class="text-zinc-400">Referrals</p>
                        <p class="text-5xl font-bold mt-2">${currentUser.referrals || 0}</p>
                    </div>
                    <div class="bg-zinc-900 rounded-3xl p-6">
                        <p class="text-zinc-400">Daily Interest Rate</p>
                        <p class="text-5xl font-bold mt-2 text-emerald-400">1.5%</p>
                    </div>
                </div>
                
                <div class="mt-8 bg-zinc-900 rounded-3xl p-6">
                    <h3 class="font-semibold mb-4">Recent Activity</h3>
                    <div id="recent-tx"></div>
                </div>
            `;
            document.getElementById('main-content').innerHTML = html;
            renderRecentTx(txs);
        }

        function renderRecentTx(txs) {
            const container = document.getElementById('recent-tx');
            if (!txs || txs.length === 0) {
                container.innerHTML = `<p class="text-zinc-500 py-8 text-center">No transactions yet</p>`;
                return;
            }
            let str = '';
            txs.forEach(tx => {
                str += `
                    <div class="flex justify-between py-3 border-b border-zinc-800 last:border-0">
                        <div>
                            <span class="capitalize">${tx.type}</span>
                            <p class="text-xs text-zinc-500">${new Date(tx.created_at).toLocaleString()}</p>
                        </div>
                        <span class="${tx.type === 'deposit' || tx.type === 'referral' ? 'text-emerald-400' : 'text-red-400'} font-semibold">
                            ${tx.type === 'deposit' || tx.type === 'referral' ? '+' : '-'} ₦${tx.amount.toLocaleString()}
                        </span>
                    </div>`;
            });
            container.innerHTML = str;
        }

        // Monnify Deposit Simulation (Replace with real Monnify integration)
        async function initiateDeposit() {
            const amount = parseFloat(document.getElementById('deposit-amount').value);
            if (!amount || amount < 1000) return alert("Minimum deposit ₦1,000");

            hideModal('deposit-modal');

            // Simulate successful payment
            setTimeout(async () => {
                const { error } = await supabase.from('transactions').insert({
                    user_id: currentUser.id,
                    type: 'deposit',
                    amount: amount,
                    status: 'completed'
                });

                if (!error) {
                    currentUser.balance += amount;
                    await supabase.from('users').update({ balance: currentUser.balance }).eq('id', currentUser.id);
                    alert(`Deposit of ₦${amount.toLocaleString()} successful!`);
                    showPage('dashboard');
                }
            }, 1200);
        }

        function renderWithdraw() {
            const content = document.getElementById('main-content');
            content.innerHTML = `
                <div class="max-w-lg mx-auto bg-zinc-900 rounded-3xl p-8">
                    <h3 class="text-2xl font-bold mb-6">Request Withdrawal</h3>
                    <input id="withdraw-amt" type="number" placeholder="Amount (₦)" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mb-6">
                    <button onclick="requestWithdraw()" class="w-full bg-blue-600 py-4 rounded-2xl font-semibold">Submit Request</button>
                </div>
            `;
        }

        async function requestWithdraw() {
            const amount = parseFloat(document.getElementById('withdraw-amt').value);
            if (!amount || amount > currentUser.balance) return alert("Insufficient balance");

            await supabase.from('withdrawals').insert({
                user_id: currentUser.id,
                amount: amount,
                status: 'pending'
            });
            alert("Withdrawal request submitted successfully. Awaiting admin approval.");
            showPage('dashboard');
        }

        function renderReferrals() {
            // Simple referral display
            document.getElementById('main-content').innerHTML = `
                <div class="max-w-2xl mx-auto bg-zinc-900 rounded-3xl p-8">
                    <h3 class="font-bold text-2xl mb-6">Your Referral Link</h3>
                    <div class="bg-zinc-800 p-5 rounded-2xl font-mono text-sm break-all mb-6">
                        https://yourdomain.com/ref/${currentUser.username}
                    </div>
                    <p class="text-zinc-400">You earn 20% of your referrals' first deposit.</p>
                </div>
            `;
        }

        async function renderAdminPanel() {
            const { data: allUsers } = await supabase.from('users').select('*');
            let html = `
                <div class="flex justify-between mb-6">
                    <h3 class="text-2xl font-bold">All Users (${allUsers.length})</h3>
                    <button onclick="createUser()" class="bg-violet-600 px-6 py-3 rounded-2xl">+ New User</button>
                </div>
                <div class="bg-zinc-900 rounded-3xl overflow-hidden">
                    <table class="w-full">
                        <thead><tr class="border-b border-zinc-700">
                            <th class="text-left p-6">User</th>
                            <th class="text-left p-6">Balance</th>
                            <th class="text-left p-6">Referrals</th>
                            <th class="p-6 text-center">Actions</th>
                        </tr></thead>
                        <tbody id="admin-table"></tbody>
                    </table>
                </div>
            `;
            document.getElementById('main-content').innerHTML = html;
            renderAdminTable(allUsers);
        }

        function renderAdminTable(users) {
            const tbody = document.getElementById('admin-table');
            tbody.innerHTML = users.map(user => `
                <tr class="border-b border-zinc-800 hover:bg-zinc-800/50">
                    <td class="p-6">${user.username}</td>
                    <td class="p-6 font-mono">₦${user.balance.toLocaleString()}</td>
                    <td class="p-6">${user.referrals || 0}</td>
                    <td class="p-6 text-center">
                        <button onclick="adminAddFunds(${user.id})" class="text-xs bg-emerald-900 px-4 py-2 rounded-xl mx-1">+ Fund</button>
                        <button onclick="adminResetPassword(${user.id})" class="text-xs bg-blue-900 px-4 py-2 rounded-xl mx-1">Reset PW</button>
                    </td>
                </tr>
            `).join('');
        }

        // Placeholder admin functions (expand as needed)
        function adminAddFunds(id) { alert("Fund management ready (extend with Supabase update)"); }
        function adminResetPassword(id) { alert("Password reset ready"); }
        function createUser() { alert("User creation form ready"); }

        // Show Profile
        function showProfileModal() {
            alert(`Logged in as: ${currentUser.username}\nRole: ${currentUser.role}`);
        }

        // Initialize
        window.onload = () => {
            document.getElementById('login-modal').style.display = 'flex';
            // For quick testing only — remove in production
            // document.getElementById('login-email').value = "demo@user.com";
        };

        // Expose necessary functions
        window.login = login;
        window.logout = logout;
        window.showPage = showPage;
        window.hideModal = hideModal;
        window.initiateDeposit = initiateDeposit;
        window.requestWithdraw = requestWithdraw;
        window.showHiddenAdminLogin = showHiddenAdminLogin;
        window.adminSecretLogin = adminSecretLogin;
        window.showProfileModal = showProfileModal;
        window.toggleSidebar = toggleSidebar;
    </script>
</body>
</html>
