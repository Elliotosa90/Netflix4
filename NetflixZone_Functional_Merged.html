<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NetflixZone — Invest Platform</title>
<!--
═══════════════════════════════════════════════════════════════════════════════
SQL SCHEMA — RUN THIS IN SUPABASE SQL EDITOR BEFORE USING THE APP
═══════════════════════════════════════════════════════════════════════════════

CREATE TABLE admin (id bigint GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY, username text NOT NULL, password text NOT NULL);
CREATE TABLE settings (id bigint GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY, min_deposit numeric DEFAULT 1000, min_withdraw numeric DEFAULT 500, withdraw_day integer DEFAULT 5, asset_rates jsonb DEFAULT '{"metallic":2.0,"energy":3.0,"gemstone":4.0}', monnify_api_key text DEFAULT '', monnify_contract_code text DEFAULT '', monnify_secret_key text DEFAULT '', monnify_source_account text DEFAULT '', np_api_key text DEFAULT '', np_secret_key text DEFAULT '', np_email text DEFAULT '', np_password text DEFAULT '');
CREATE TABLE profiles (username text PRIMARY KEY, full_name text NOT NULL, email text NOT NULL, phone text DEFAULT '', password text NOT NULL, balance numeric DEFAULT 0, invested numeric DEFAULT 0, profit numeric DEFAULT 0, referral_bonus numeric DEFAULT 0, referral_code text DEFAULT '', referred_by text DEFAULT '', plan text DEFAULT 'Basic', status text DEFAULT 'active', asset text DEFAULT 'metallic', last_asset_switch text DEFAULT '', last_interest_date text DEFAULT '', created_at timestamptz DEFAULT now(), processed_references jsonb DEFAULT '[]'::jsonb);
CREATE TABLE transactions (id bigint GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY, username text REFERENCES profiles(username), type text NOT NULL, amount numeric NOT NULL, description text DEFAULT '', created_at text NOT NULL, payout_ref text DEFAULT '');
CREATE TABLE withdrawals (id bigint GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY, username text REFERENCES profiles(username), amount numeric NOT NULL, type text DEFAULT 'crypto', currency text DEFAULT '', wallet_address text DEFAULT '', bank_name text DEFAULT '', bank_code text DEFAULT '', account_number text DEFAULT '', account_holder text DEFAULT '', status text DEFAULT 'pending', created_at text NOT NULL, approved_at text DEFAULT '', payout_ref text DEFAULT '', payout_status text DEFAULT '', payout_response text DEFAULT '', payout_error text DEFAULT '');
CREATE TABLE referrals (id bigint GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY, referrer text REFERENCES profiles(username), referee text NOT NULL, bonus numeric DEFAULT 0, created_at text NOT NULL);
INSERT INTO admin (username, password) VALUES ('admin', 'admin123') ON CONFLICT DO NOTHING;
INSERT INTO settings (id) VALUES (1) ON CONFLICT DO NOTHING;

═══════════════════════════════════════════════════════════════════════════════
-->
<style>
:root{--bg:#0a0b0d;--card:#12141a;--card2:#1a1d26;--border:#282b33;--text:#f0f0f0;--muted:#808080;--primary:#e50914;--primary-hover:#b20710;--green:#1db954;--yellow:#f5c518;--purple:#9b59b6;--orange:#f39c12;--blue:#3498db;--red:#e74c3c;--radius:8px;--shadow:0 4px 24px rgba(0,0,0,.5)}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
input,select,button,textarea{font-family:inherit;font-size:14px}
a{color:var(--primary);text-decoration:none}
.hidden{display:none!important}
.container{max-width:1200px;margin:0 auto;padding:16px}
.glass{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
h1{font-size:24px;font-weight:800}
h2{font-size:20px;font-weight:700;margin-bottom:12px}
h3{font-size:16px;font-weight:600;margin-bottom:8px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 22px;border-radius:var(--radius);font-weight:600;border:none;cursor:pointer;transition:all .2s;font-size:14px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{opacity:.85}
.btn-yellow{background:var(--yellow);color:#000}
.btn-yellow:hover{opacity:.85}
.btn-orange{background:var(--orange);color:#fff}
.btn-orange:hover{opacity:.85}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{opacity:.85}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{opacity:.85}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{background:var(--card2)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-block{display:flex;width:100%}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge.deposit{background:rgba(29,185,84,.15);color:var(--green)}
.badge.withdraw{background:rgba(229,9,20,.15);color:var(--primary)}
.badge.bank_withdraw{background:rgba(52,152,219,.15);color:var(--blue)}
.badge.profit{background:rgba(155,89,182,.15);color:var(--purple)}
.badge.referral{background:rgba(245,197,24,.15);color:var(--yellow)}
.badge.asset_switch{background:rgba(243,156,18,.15);color:var(--orange)}
.badge.pending{background:rgba(245,197,24,.15);color:var(--yellow)}
.badge.approved{background:rgba(29,185,84,.15);color:var(--green)}
.badge.declined{background:rgba(229,9,20,.15);color:var(--primary)}
.amount-green{color:var(--green);font-weight:700}
.amount-red{color:var(--primary);font-weight:700}
.amount-yellow{color:var(--yellow);font-weight:700}
.amount-purple{color:var(--purple);font-weight:700}
.monnify-badge{display:inline-block;background:rgba(52,152,219,.15);color:var(--blue);font-size:10px;padding:2px 6px;border-radius:10px;margin-left:4px;font-weight:600}
.np-badge{display:inline-block;background:rgba(155,89,182,.15);color:var(--purple);font-size:10px;padding:2px 6px;border-radius:10px;margin-left:4px;font-weight:600}
.balance-row{display:flex;flex-wrap:wrap;gap:12px;margin:16px 0}
.balance-card{flex:1;min-width:140px;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.balance-card .label{font-size:12px;color:var(--muted);margin-bottom:4px}
.balance-card .value{font-size:20px;font-weight:800}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.asset-card{cursor:pointer;background:var(--card2);border:2px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;transition:all .2s}
.asset-card:hover{border-color:var(--muted)}
.asset-card.selected{border-color:var(--primary);background:rgba(229,9,20,.08)}
.asset-card .icon{font-size:32px}
.asset-card .name{font-size:14px;font-weight:600;margin-top:4px}
.asset-card .rate{font-size:12px;color:var(--green);margin-top:2px}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:9999;padding:16px}
.modal.active{display:flex}
.modal-content{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;position:relative}
.modal-content h2{margin-bottom:16px}
.modal-close{position:absolute;top:12px;right:16px;font-size:24px;cursor:pointer;color:var(--muted);background:none;border:none}
.modal-close:hover{color:var(--text)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;color:var(--muted);margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:10px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card2);color:var(--text);outline:none;transition:border .2s}
.form-group input:focus,.form-group select:focus{border-color:var(--primary)}
.error{color:var(--primary);font-size:13px;margin-top:4px}
.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tabs button{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:13px;transition:all .2s}
.tabs button.active{border-color:var(--primary);color:var(--text);background:rgba(229,9,20,.1)}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:10px 8px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-weight:600;font-size:12px}
.status-green{color:var(--green)}
.status-red{color:var(--primary)}
.status-yellow{color:var(--yellow)}
.nav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nav-brand{font-size:20px;font-weight:900;color:var(--primary)}
.nav-user{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--muted)}
.nav-user .logout{color:var(--primary);cursor:pointer;font-weight:600}
.bottom-nav{position:fixed;bottom:0;left:0;width:100%;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100}
.bottom-nav button{flex:1;padding:10px 0;background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:2px}
.bottom-nav button.active{color:var(--primary);font-weight:700}
.bottom-nav button .bn-icon{font-size:18px}
.admin-card{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.admin-card .user-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.admin-card .user-detail{font-size:13px;color:var(--muted);margin:2px 0}
.admin-card .admin-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.admin-card .admin-actions button{font-size:11px;padding:5px 10px}
.withdraw-type-tabs{display:flex;gap:0;margin-bottom:14px;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.withdraw-type-tabs div{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;background:var(--card2);color:var(--muted);transition:all .2s}
.withdraw-type-tabs div.active{background:var(--primary);color:#fff}
@media(max-width:600px){.grid-2,.grid-3{grid-template-columns:1fr}.balance-row{gap:8px}.container{padding:12px}.modal-content{padding:16px}}
</style>
</head>
<body>

<!-- ─── AUTH SCREEN ─── -->
<div id="authScreen">
<div class="container" style="display:flex;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:20px">
<div style="text-align:center;margin-bottom:8px">
<div style="font-size:48px;font-weight:900;color:var(--primary);letter-spacing:-2px">NZ</div>
<div style="font-size:14px;color:var(--muted);margin-top:4px">NetflixZone Investment</div>
</div>
<div class="glass" style="width:100%;max-width:400px">
<div id="authTabs" class="tabs" style="justify-content:center">
<button id="tabLoginBtn" class="active" onclick="showAuthTab('login')">Login</button>

</div>

<div class="form-group"><label>Username</label><input type="text" id="regUser" placeholder="Username"></div>
<div class="form-group"><label>Password</label><input type="password" id="regPass" placeholder="Password"></div>
<div class="form-group"><label>Referral Code (optional)</label><input type="text" id="regRef" placeholder="Referral code"></div>

</div>
</div>
</div>
</div>

<!-- ─── DASHBOARD ─── -->
<div id="dashboardScreen" class="hidden">
<div class="nav">
<div class="nav-brand">NetflixZone</div>
<div class="nav-user">
<span id="navUsername"></span>
<span class="logout" id="logoutBtn" onclick="logout()">Logout</span>
</div>
</div>

</div>

<div class="bottom-nav" id="bottomNav">

<button data-tab="invest" onclick="switchUserTab('invest')"><span class="bn-icon">💎</span>Invest</button>
<button data-tab="withdraw" onclick="switchUserTab('withdraw')"><span class="bn-icon">💸</span>Withdraw</button>
<button data-tab="referrals" onclick="switchUserTab('referrals')"><span class="bn-icon">👥</span>Refer</button>

<button data-tab="profile" onclick="switchUserTab('profile')"><span class="bn-icon">👤</span>Profile</button>
</div>
</div>

<div id="adminScreen" class="hidden">
<div class="nav">
<div class="nav-brand">NetflixZone · Admin</div>
<div class="nav-user">
<span>Admin</span>
<span class="logout" onclick="logout()">Logout</span>
</div>
</div>

<button data-tab="admin_settings" onclick="switchAdminTab('settings')"><span class="bn-icon">⚙️</span>Settings</button>
<button data-tab="admin_payments" onclick="switchAdminTab('payments')"><span class="bn-icon">💳</span>Payments</button>
<button data-tab="admin_broadcast" onclick="switchAdminTab('broadcast')"><span class="bn-icon">📢</span>Broadcast</button>

</div>

<!-- ─── MODALS ─── -->
<div id="depositModal" class="modal"><div class="modal-content"><button class="modal-close" onclick="closeModal('depositModal')">&times;</button><h2>💳 Deposit</h2><div id="depositInfo" style="font-size:13px;color:var(--muted);margin-bottom:12px"></div><div class="form-group"><label>Amount (NGN)</label><input type="number" id="depositAmount" placeholder="Min deposit"></div><div class="form-group"><label>Email</label><input type="email" id="depositEmail" placeholder="Email for Monnify"></div><div id="depositError" class="error"></div><button class="btn btn-primary btn-block" onclick="processDeposit()">Pay with Monnify</button></div></div>

<div id="depositResultModal" class="modal"><div class="modal-content"><button class="modal-close" onclick="closeModal('depositResultModal')">&times;</button><h2 id="depositResultTitle">Confirmed!</h2><div id="depositResultContent" style="font-size:16px"></div></div></div>

<div id="withdrawModal" class="modal"><div class="modal-content"><button class="modal-close" onclick="closeModal('withdrawModal')">&times;</button><h2>💸 Withdraw</h2><div class="withdraw-type-tabs"><div class="active" onclick="switchWithdrawType('crypto')">💎 Crypto</div><div onclick="switchWithdrawType('bank')">🏦 Bank</div></div><div id="withdrawError" class="error"></div><div id="cryptoWithdrawFields"><div class="form-group"><label>Currency</label><select id="wdCurrency"><option>USDT (TRC20)</option><option>Bitcoin (BTC)</option><option>Ethereum (ETH)</option><option>Tron (TRX)</option><option>Litecoin (LTC)</option><option>Dogecoin (DOGE)</option><option>Solana (SOL)</option></select></div><div class="form-group"><label>Wallet Address</label><input type="text" id="wdWallet" placeholder="Wallet address"></div></div><div id="bankWithdrawFields" class="hidden"><div class="form-group"><label>Bank</label><select id="wdBankName"></select></div><div class="form-group"><label>Account Number</label><input type="text" id="wdAccountNumber" placeholder="Account number" maxlength="10"></div><div class="form-group"><label>Account Holder</label><input type="text" id="wdAccountHolder" placeholder="Full name on account"></div></div><div class="form-group"><label>Amount (NGN)</label><input type="number" id="wdAmount" placeholder="Min withdraw"></div><button class="btn btn-primary btn-block" onclick="submitWithdraw()">Request Withdrawal</button></div></div>

<div id="assetSwitchModal" class="modal"><div class="modal-content"><button class="modal-close" onclick="closeModal('assetSwitchModal')">&times;</button><h2>🔄 Switch Asset</h2><p style="font-size:13px;color:var(--muted);margin-bottom:12px">Select a new asset class. Switch fee: <strong id="switchFeeDisplay">5%</strong> of invested balance.</p><div id="assetSwitchGrid" class="grid-3"></div><div id="assetSwitchError" class="error"></div><button class="btn btn-primary btn-block" onclick="confirmAssetSwitch()" style="margin-top:12px">Confirm Switch</button></div></div>

<div id="payoutResultModal" class="modal"><div class="modal-content"><button class="modal-close" onclick="closeModal('payoutResultModal')">&times;</button><h2 id="payoutResultTitle">Payout</h2><div id="payoutResultContent" style="font-size:14px"></div></div></div>

<div id="adminProfileModal" class="modal"><div class="modal-content"><button class="modal-close" onclick="closeModal('adminProfileModal')">&times;</button><h2>👤 User Profile</h2><div id="adminProfileContent"></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// SUPABASE CONFIG — REPLACE THESE THREE VALUES
// ═══════════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://YOUR-PROJECT.supabase.co';
const SUPABASE_ANON_KEY = 'YOUR-ANON-KEY';
const SUPABASE_SERVICE_KEY = 'YOUR-SERVICE-ROLE-KEY';

const supabaseAnon = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const supabaseAdmin = supabase.createClient(SUPABASE_URL, SUPABASE_SERVICE_KEY);

// ═══════════════════════════════════════════════════════════════
// CONSTANTS & STATE
// ═══════════════════════════════════════════════════════════════
const ASSET_TYPES = {metallic:{name:'Metallic',icon:'⚙️',color:'#808080',defaultRate:2.0},energy:{name:'Energy',icon:'⚡',color:'#f39c12',defaultRate:3.0},gemstone:{name:'Gemstone',icon:'💎',color:'#9b59b6',defaultRate:4.0}};
var currentUser = '', currentUserData = null, isAdminLoggedIn = false;
var currentTxTab = 'all', currentAdminTab = 'users', currentUserTab = 'dashboard';
var _settings = null, _allProfilesCache = null;

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtNaira(n){return '₦'+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function nowString(){return new Date().toISOString()}
function todayDateString(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function minDep(){return _settings&&_settings.min_deposit?_settings.min_deposit:1000}
function minWd(){return _settings&&_settings.min_withdraw?_settings.min_withdraw:500}
function wdDay(){return _settings&&_settings.withdraw_day?parseInt(_settings.withdraw_day):-1}
function wdName(d){var days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];return days[d]||'Unknown'}
function getAssetInfo(aid){return ASSET_TYPES[aid]||ASSET_TYPES.metallic}
function getUserInterestRate(u){var asset=(u&&u.asset)||'metallic';var rates=(_settings&&_settings.asset_rates)||{};var r=rates[asset];return r!==undefined&&r!==null?parseFloat(r):ASSET_TYPES[asset]?ASSET_TYPES[asset].defaultRate:2.0}
function closeModal(id){document.getElementById(id).classList.remove('active')}
function getSession(){try{var s=localStorage.getItem('nz_session');return s?JSON.parse(s):null}catch(e){return null}}
function saveSession(obj){localStorage.setItem('nz_session',JSON.stringify(obj))}
function clearSession(){localStorage.removeItem('nz_session')}

// ═══════════════════════════════════════════════════════════════
// SETTINGS LOADER
// ═══════════════════════════════════════════════════════════════
async function loadSettings(force){if(_settings&&!force)return _settings;var{data}=await supabaseAdmin.from('settings').select('*').single();if(data)_settings=data;return _settings}

// ═══════════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════════
function showAuthTab(tab){document.getElementById('loginForm').classList.toggle('hidden',tab!=='login');document.getElementById('registerForm').classList.toggle('hidden',tab!=='register');document.getElementById('tabLoginBtn').classList.toggle('active',tab==='login');document.getElementById('tabRegisterBtn').classList.toggle('active',tab==='register');document.getElementById('loginError').textContent='';document.getElementById('regError').textContent=''}

async function login(){var u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value.trim(),e=document.getElementById('loginError');e.textContent='';if(!u||!p){e.textContent='Enter username and password.';return}if(u==='admin'){var{data:a}=await supabaseAdmin.from('admin').select('*').single();if(a&&a.password===p){isAdminLoggedIn=true;currentUser='admin';currentUserData=null;saveSession({username:'admin',isAdmin:true});enterDashboard('admin');return}else{e.textContent='Wrong admin password.';return}}var{data:user}=await supabaseAdmin.from('profiles').select('*').eq('username',u).single();if(!user||user.password!==p){e.textContent='Invalid username or password.';return}if(user.status==='closed'){e.textContent='Account closed.';return}currentUser=u;currentUserData=user;isAdminLoggedIn=false;saveSession({username:u,isAdmin:false});await applyDailyInterest();enterDashboard('user')}

async function register(){var n=document.getElementById('regName').value.trim(),u=document.getElementById('regUser').value.trim(),p=document.getElementById('regPass').value.trim(),r=document.getElementById('regRef').value.trim(),e=document.getElementById('regError');e.textContent='';if(!n||!u||!p){e.textContent='Fill name, username, and password.';return}if(u==='admin'){e.textContent='Username taken.';return}var{data:ex}=await supabaseAdmin.from('profiles').select('username').eq('username',u).single();if(ex){e.textContent='Username taken.';return}var refBy=r||null;if(r){var{data:refUser}=await supabaseAdmin.from('profiles').select('username').eq('username',r).single();if(!refUser){e.textContent='Invalid referral code.';return}}await supabaseAdmin.from('profiles').insert({username:u,full_name:n,email:u+'@netflixzone.local',phone:'',password:p,balance:0,invested:0,profit:0,referral_bonus:0,referral_code:u,referred_by:refBy||'',plan:'Basic',status:'active',asset:'metallic',last_asset_switch:'',last_interest_date:''});currentUser=u;currentUserData=null;isAdminLoggedIn=false;saveSession({username:u,isAdmin:false});loadSettings().then(function(){enterDashboard('user')})}

function logout(){clearSession();currentUser='';currentUserData=null;isAdminLoggedIn=false;document.getElementById('authScreen').classList.remove('hidden');document.getElementById('dashboardScreen').classList.add('hidden');document.getElementById('adminScreen').classList.add('hidden')}

// ═══════════════════════════════════════════════════════════════
// INTEREST ENGINE
// ═══════════════════════════════════════════════════════════════
async function applyDailyInterest(){if(!currentUserData)return;var today=todayDateString();if(currentUserData.last_interest_date===today)return;var rate=getUserInterestRate(currentUserData);if(currentUserData.balance>0&&currentUserData.status==='active'){var interest=currentUserData.balance*(rate/100);await supabaseAdmin.from('profiles').update({balance:currentUserData.balance+interest,profit:(currentUserData.profit||0)+interest,last_interest_date:today}).eq('username',currentUser);var ai=getAssetInfo(currentUserData.asset||'metallic');await supabaseAdmin.from('transactions').insert({username:currentUser,type:'profit',amount:interest,description:ai.icon+' '+ai.name+' interest '+rate+'%',created_at:nowString()});currentUserData.balance+=interest;currentUserData.profit=(currentUserData.profit||0)+interest;currentUserData.last_interest_date=today}}

async function renderTransactions(){var tb=document.getElementById('txTableBody');if(!tb)return;var{data:txRes}=await supabaseAdmin.from('transactions').select('*').eq('username',currentUser).order('created_at',{ascending:false});var{data:wdRes}=await supabaseAdmin.from('withdrawals').select('*').eq('username',currentUser).order('created_at',{ascending:false});var{data:refRes}=await supabaseAdmin.from('referrals').select('*').eq('referrer',currentUser).order('created_at',{ascending:false});var allTx=[];(txRes.data||[]).forEach(function(t){allTx.push({date:t.created_at,type:t.type,amount:t.type==='withdraw'?-Math.abs(t.amount):t.amount,status:'completed',description:t.description||'',payoutRef:t.payout_ref||''})});(wdRes.data||[]).forEach(function(w){var wT=w.type==='bank'?'bank_withdraw':'withdraw',det='';if(w.type==='bank'){det=w.bank_name+': '+w.account_number+' ('+w.account_holder+')';if(w.payout_ref)det+=' | Ref: '+w.payout_ref}else{det='→ '+w.currency+': '+(w.wallet_address||'').substring(0,16)+'...';if(w.payout_ref)det+=' | Ref: '+w.payout_ref}allTx.push({date:w.created_at,type:wT,amount:-Math.abs(w.amount),status:w.status,description:det,payoutRef:w.payout_ref||'',isBank:w.type==='bank'})});(refRes.data||[]).forEach(function(r){allTx.push({date:r.created_at,type:'referral',amount:r.bonus,status:'approved',description:'Bonus from '+r.referee})});var f=allTx;if(currentTxTab==='deposits')f=allTx.filter(function(t){return t.type==='deposit'});else if(currentTxTab==='withdrawals')f=allTx.filter(function(t){return t.type==='withdraw'||t.type==='bank_withdraw'});else if(currentTxTab==='profits')f=allTx.filter(function(t){return t.type==='profit'});else if(currentTxTab==='referrals')f=allTx.filter(function(t){return t.type==='referral'});else if(currentTxTab==='asset_switch')f=allTx.filter(function(t){return t.type==='asset_switch'});f.sort(function(a,b){return new Date(b.date)-new Date(a.date)});if(!f.length){tb.innerHTML='<tr><td colspan="5" style="text-align:center;color:#808080;">No transactions.</td></tr>';return}tb.innerHTML=f.map(function(t){var bc=t.type==='deposit'?'deposit':t.type==='profit'?'profit':t.type==='referral'?'referral':t.type==='asset_switch'?'asset_switch':t.type==='bank_withdraw'?'bank_withdraw':t.status==='pending'?'pending':t.status==='approved'?'approved':t.status==='declined'?'declined':'withdraw';var ac=(t.type==='deposit'||t.type==='profit'||t.type==='referral')?'amount-green':t.status==='pending'?'amount-yellow':'amount-red';if(t.type==='asset_switch')ac='amount-purple';var s=(t.type==='withdraw'||t.type==='bank_withdraw')?'':(t.type==='referral'||t.type==='deposit'||t.type==='profit')?'+':'';var am=Math.abs(t.amount),sl=t.status==='pending'?'Pending':t.status==='approved'?'Approved':t.status==='declined'?'Declined':'Completed';var tl=t.type==='bank_withdraw'?'Bank Withdraw':(t.type==='asset_switch'?'Asset Switch':(t.type==='withdraw'?'Crypto W/D':t.type));var pb='';if(t.payoutRef)pb=t.type==='bank_withdraw'?' <span class="monnify-badge">PAID</span>':' <span class="np-badge">PAID</span>';return'<tr><td>'+esc(t.date)+'</td><td><span class="badge '+bc+'">'+tl+'</span>'+pb+'</td><td class="'+ac+'">'+s+fmtNaira(am)+'</td><td><span class="badge '+bc+'">'+sl+'</span></td><td style="font-size:12px;color:#b3b3b3;">'+esc(t.description)+'</td></tr>'}).join('')}

async function showDepositModal(){await loadSettings();if(!_settings||!_settings.monnify_api_key||!_settings.monnify_contract_code){alert('Monnify not configured. Admin must set API Key and Contract Code first.');return}document.getElementById('depositError').textContent='';document.getElementById('depositAmount').value='';document.getElementById('depositEmail').value=(currentUserData&&currentUserData.email)||'';document.getElementById('depositInfo').textContent='Minimum deposit: '+fmtNaira(minDep())+' NGN.';document.getElementById('depositModal').classList.add('active')}
function processDeposit(){var amt=parseFloat(document.getElementById('depositAmount').value),em=document.getElementById('depositEmail').value.trim(),e=document.getElementById('depositError');if(!amt||amt<minDep()){e.textContent='Minimum '+fmtNaira(minDep())+' NGN.';return}if(!em){e.textContent='Enter email.';return}if(!_settings||!_settings.monnify_api_key||!_settings.monnify_contract_code){e.textContent='Monnify not configured.';return}var apiKey=_settings.monnify_api_key,cc=_settings.monnify_contract_code,ref='NZ-'+Date.now()+'-'+Math.random().toString(36).substring(2,8);closeModal('depositModal');if(typeof MonnifySDK==='undefined'){alert('Monnify SDK not loaded.');return}MonnifySDK.initialize({amount:amt,currency:"NGN",reference:ref,customerFullName:(currentUserData&&(currentUserData.full_name||currentUser))||currentUser,customerEmail:em,apiKey:apiKey,contractCode:cc,paymentDescription:"NetflixZone deposit for "+currentUser,isTestMode:true,metadata:{username:currentUser,depositType:"user_deposit"},onComplete:function(resp){creditDeposit(ref,amt,em,resp)},onClose:function(data){}})}
async function creditDeposit(ref,amt,em,resp){var{data:p}=await supabaseAdmin.from('profiles').select('*').eq('username',currentUser).single();if(!p){alert('Session expired.');return}var pr=p.processed_references||[];if(pr.indexOf(ref)!==-1)return;pr.push(ref);await supabaseAdmin.from('profiles').update({balance:p.balance+amt,invested:p.invested+amt,processed_references:pr}).eq('username',currentUser);var tr=(resp&&resp.transactionReference)?resp.transactionReference:ref;await supabaseAdmin.from('transactions').insert({username:currentUser,type:'deposit',amount:amt,description:'Monnify - '+tr,created_at:nowString()});if(p.referred_by)await registerReferralBonus(currentUser,amt);var extras=p.referred_by?'<br>Referrer got 20% bonus!':'';document.getElementById('depositResultTitle').textContent='Payment Confirmed!';document.getElementById('depositResultContent').innerHTML=fmtNaira(amt)+' credited.'+extras+'<br><br><small style="color:#808080;">Ref: '+esc(tr)+'</small>';document.getElementById('depositResultModal').classList.add('active')}

async function registerReferralBonus(username,depAmt){var{data:p}=await supabaseAdmin.from('profiles').select('referred_by').eq('username',username).single();if(!p||!p.referred_by)return;var bonus=depAmt*0.20;var{data:refP}=await supabaseAdmin.from('profiles').select('referral_bonus,balance').eq('username',p.referred_by).single();if(!refP)return;await supabaseAdmin.from('profiles').update({referral_bonus:(refP.referral_bonus||0)+bonus,balance:(refP.balance||0)+bonus}).eq('username',p.referred_by);await supabaseAdmin.from('referrals').insert({referrer:p.referred_by,referee:username,bonus:bonus,created_at:nowString()})}

var currentWithdrawType='crypto';
function switchWithdrawType(type){currentWithdrawType=type;document.querySelectorAll('.withdraw-type-tabs div').forEach(function(e){e.classList.remove('active')});if(type==='crypto'){document.querySelector('.withdraw-type-tabs div:first-child').classList.add('active');document.getElementById('cryptoWithdrawFields').classList.remove('hidden');document.getElementById('bankWithdrawFields').classList.add('hidden')}else{document.querySelector('.withdraw-type-tabs div:last-child').classList.add('active');document.getElementById('cryptoWithdrawFields').classList.add('hidden');document.getElementById('bankWithdrawFields').classList.remove('hidden')}document.getElementById('withdrawError').textContent=''}
function showWithdrawModal(){if(currentUserData.status==='frozen'){alert('Withdrawals disabled.');return}var day=wdDay();if(day!==-1){var t=new Date();if(t.getDay()!==day){alert('Withdrawals on '+wdName(day)+' only.');return}}closeModal('withdrawModal');document.getElementById('withdrawError').textContent='';document.getElementById('wdAmount').value='';document.getElementById('wdWallet').value='';document.getElementById('wdAccountNumber').value='';document.getElementById('wdAccountHolder').value='';if(currentWithdrawType!=='bank'){switchWithdrawType('crypto')}loadBankList();document.getElementById('withdrawModal').classList.add('active')}
async function loadBankList(){var sel=document.getElementById('wdBankName');sel.innerHTML='<option>Loading banks...</option>';var ak=_settings&&_settings.monnify_api_key,sk=_settings&&_settings.monnify_secret_key;if(!ak||!sk){sel.innerHTML='<option>Monnify not configured</option>';return}var basicAuth=btoa(ak+':'+sk);try{var authRes=await fetch('https://sandbox.monnify.com/api/v1/auth/login',{method:'POST',headers:{'Authorization':'Basic '+basicAuth}}).then(function(r){return r.json()});if(!authRes||!authRes.responseBody||!authRes.responseBody.accessToken){sel.innerHTML='<option>Auth failed</option>';return}var token=authRes.responseBody.accessToken;var banksRes=await fetch('https://sandbox.monnify.com/api/v1/banks',{headers:{'Authorization':'Bearer '+token}}).then(function(r){return r.json()});if(banksRes&&banksRes.responseBody){sel.innerHTML=banksRes.responseBody.map(function(b){return'<option value="'+esc(b.code)+'">'+esc(b.name)+'</option>'}).join('')}else{sel.innerHTML='<option>No banks</option>'}}catch(err){sel.innerHTML='<option>Error loading</option>'}}
function submitWithdraw(){var amt=parseFloat(document.getElementById('wdAmount').value);if(!amt||amt<minWd()){document.getElementById('withdrawError').textContent='Minimum '+fmtNaira(minWd())+' NGN.';return}if(amt>currentUserData.balance){document.getElementById('withdrawError').textContent='Insufficient balance.';return}var wdObj={username:currentUser,amount:amt,status:'pending',created_at:nowString()};if(currentWithdrawType==='crypto'){var wallet=document.getElementById('wdWallet').value.trim(),cur=document.getElementById('wdCurrency').value;if(!wallet){document.getElementById('withdrawError').textContent='Enter wallet address.';return}wdObj.type='crypto';wdObj.currency=cur;wdObj.wallet_address=wallet}else{var bankName=document.getElementById('wdBankName');var bankCode=bankName.options[bankName.selectedIndex].value;var bankText=bankName.options[bankName.selectedIndex].text;var acct=document.getElementById('wdAccountNumber').value.trim();var holder=document.getElementById('wdAccountHolder').value.trim();if(!acct||acct.length<10){document.getElementById('withdrawError').textContent='Valid 10-digit account number.';return}if(!holder){document.getElementById('withdrawError').textContent='Enter account holder name.';return}wdObj.type='bank';wdObj.bank_name=bankText;wdObj.bank_code=bankCode;wdObj.account_number=acct;wdObj.account_holder=holder}closeModal('withdrawModal');supabaseAdmin.from('profiles').update({balance:currentUserData.balance-amt}).eq('username',currentUser).then(function(){currentUserData.balance-=amt;supabaseAdmin.from('withdrawals').insert(wdObj).then(function(){refreshUserData();alert('Withdrawal request submitted.')})})}

var _pendingAssetSwitch=null;
function prepareAssetSwitch(aid){if(aid===currentUserData.asset){alert('Already on '+ASSET_TYPES[aid].name+'.');return}var switchFee=5;var feeAmount=currentUserData.invested*(switchFee/100);document.getElementById('switchFeeDisplay').textContent=switchFee+'%';var html='';for(var a in ASSET_TYPES){var aa=ASSET_TYPES[a],ar=_settings&&_settings.asset_rates?_settings.asset_rates[a]:null,rr=ar!==undefined&&ar!==null?parseFloat(ar):aa.defaultRate;html+='<div class="asset-card'+(a===aid?' selected':'')+'" onclick="selectSwitchAsset(\''+a+'\')"><div class="icon">'+aa.icon+'</div><div class="name">'+aa.name+'</div><div class="rate">'+rr+'% daily</div></div>'}document.getElementById('assetSwitchGrid').innerHTML=html;document.getElementById('assetSwitchError').textContent='';_pendingAssetSwitch=aid;document.getElementById('assetSwitchModal').classList.add('active')}
function selectSwitchAsset(aid){document.querySelectorAll('#assetSwitchGrid .asset-card').forEach(function(c){c.classList.remove('selected')});event.target.closest('.asset-card').classList.add('selected');_pendingAssetSwitch=aid}
async function confirmAssetSwitch(){if(!_pendingAssetSwitch||!_pendingAssetSwitch||_pendingAssetSwitch===currentUserData.asset){document.getElementById('assetSwitchError').textContent='Select a different asset.';return}var switchFee=5;var feeAmount=currentUserData.invested*(switchFee/100);if(currentUserData.balance<feeAmount){document.getElementById('assetSwitchError').textContent='Insufficient balance for fee: need '+fmtNaira(feeAmount);return}var newAsset=_pendingAssetSwitch;var now=new Date();var lastSwitch=currentUserData.last_asset_switch;if(lastSwitch){var ls=new Date(lastSwitch);var diffDays=Math.floor((now-ls)/(1000*60*60*24));if(diffDays<7){document.getElementById('assetSwitchError').textContent='Must wait 7 days between switches. '+Math.ceil(7-diffDays)+' days remaining.';return}}closeModal('assetSwitchModal');await supabaseAdmin.from('profiles').update({asset:newAsset,balance:currentUserData.balance-feeAmount,last_asset_switch:now.toISOString()}).eq('username',currentUser);var ai=getAssetInfo(newAsset);await supabaseAdmin.from('transactions').insert({username:currentUser,type:'asset_switch',amount:0,description:'Switched to '+ai.icon+' '+ai.name+' (fee: '+fmtNaira(feeAmount)+')',created_at:nowString()}).eq('username',currentUser);currentUserData.asset=newAsset;currentUserData.balance-=feeAmount;currentUserData.last_asset_switch=now.toISOString();_pendingAssetSwitch=null;refreshUserData()}

tyle="flex:1;min-width:120px;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--card2);color:var(--text)"></div><button class="btn btn-primary btn-sm" onclick="adminSaveMonnifyKeys()">Save</button><span id="monnifyMsg" style="margin-left:8px;font-size:13px;color:var(--green)"></span></div>class="glass" style="margin-bottom:12px"><h3>🔑 NOWPayments API</h3><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px"><input type="text" id="adminNPApiKey" placeholder="API Key" style="flex:1;min-width:120px;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--card2);color:var(--text)"><input type="text" id="adminNPSecretKey" placeholder="Secret Key (IPN)" style="flex:1;min-width:120px;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--card2);color:var(--text)"></div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px"><input type="text" id="adminNPEmail" placeholder="Email" style="flex:1;min-width:120px;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--card2);color:var(--text)"><input type="password" id="adminNPPassword" placeholder="Password" style="flex:1;min-width:120px;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--card2);color:var(--text)"></div><button class="btn btn-primary btn-sm" onclick="adminSaveNPKeys()">Save</button><span id="npMsg" style="margin-left:8px;font-size:13px;color:var(--green)"></span></div><div class="glass" style="margin-bottom:12px"><h3>🔑 Change Admin Password</h3><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px"><input type="password" id="adminCurrentPass" placeholder="Current password" style="flex:1;min-width:120px;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--card2);color:var(--text)"><input type="password" id="adminNewPassInput" placeholder="New password" style="flex:1;min-width:120px;padding:8px;border-radius:6px;border:1px solid var(- ize:13px"></div></div>';break}}

function renderAssetRatesGrid(){var g=document.getElementById('assetRatesGrid');if(!g)return;g.innerHTML='';for(var a in ASSET_TYPES){var aa=ASSET_TYPES[a],ar=_settings&&_settings.asset_rates?_settings.asset_rates[a]:null,rr=ar!==undefined&&ar!==null?ar:aa.defaultRate;g.innerHTML+='<div style="text-align:center"><label style="font-size:13px;color:var(--muted);display:block;margin-bottom:4px">'+aa.icon+' '+aa.name+'</label><input type="number" step="0.1" id="adminAssetRate_'+a+'" value="'+rr+'" style="width:100px;padding:6px;border-radius:6px;border:1px solid var(--border);background:var(--card2);color:var(--text);text-align:center"></div>'}}

async function refreshAdminData(){await loadSettings();var{data:profiles}=await supabaseAdmin.from('profiles').select('*');if(!profiles)return;var totalUsers=profiles.length,activeUsers=profiles.filter(function(p){return p.status==='active'}).length;document.getElementById('adminTotalUsers')&&(document.getElementById('adminTotalUsers').textContent=totalUsers);document.getElementById('adminActiveUsers')&&(document.getElementById('adminActiveUsers').textContent=activeUsers);var cardsEl=document.getElementById('adminUserCards');if(!cardsEl)return;var sortedUsers=profiles.slice().sort(function(a,b){return a.username.localeCompare(b.username)});cardsEl.innerHTML=sortedUsers.map(function(u){var ai=getAssetInfo(u.asset||'metallic');return'<div class="admin-card"><div class="user-header"><h4>'+esc(u.username)+'</h4><span class="status-badge badge '+(u.status||'active')+'">'+(u.status||'active')+'</span></div><div class="user-detail"><strong>Name:</strong> '+esc(u.full_name)+'</div><div class="user-detail"><strong>Email:</strong> '+esc(u.email)+'</div><div class="user-detail"><strong>Asset:</strong> '+ai.icon+' '+ai.name+'</div><div class="user-detail"><strong>Balance:</strong> '+fmtNaira(u.balance)+'</div><div class="user-detail"><strong>Invested:</strong> '+fmtNaira(u.invested)+'</div><div class="user-detail"><strong>Profit:</strong> '+fmtNaira(u.profit||0)+'</div><div class="user-detail"><strong>Ref Bonus:</strong> '+fmtNaira(u.referral_bonus||0)+'</div><div class="admin-actions"><select id="userStatus_'+u.username+'" style="padding:4px 8px;border-radius:4px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:12px"><option value="active"'+(u.status==='active'?' selected':'')+'>Active</option><option value="frozen"'+(u.status==='frozen'?' selected':'')+'>Frozen</option><option value="closed"'+(u.status==='closed'?' selected':'')+'>Closed</option></select><button class="btn-blue btn-sm" onclick="adminSetStatus(\''+u.username+'\')">Set</button><button class="btn-green btn-sm" onclick="adminAddBalance(\''+u.username+'\')">+Fund</button><button class="btn-orange btn-sm" onclick="adminDeductBalance(\''+u.username+'\')">-Deduct</button><button class="btn-red btn-sm" onclick="adminDeleteUser(\''+u.username+'\')">🗑️ Delete</button></div></div>'}).join('');renderPendingWithdrawals()}

async function renderPendingWithdrawals(){var el=document.getElementById('pendingWithdrawals');if(!el)return;var{data:wds}=await supabaseAdmin.from('withdrawals').select('*').eq('status','pending').order('created_at',{ascending:false});if(!wds||!wds.length){el.innerHTML='<h3 style="margin-top:14px">📋 Pending Withdrawals</h3><p style="color:#808080;">None pending.</p>';return}el.innerHTML='<h3 style="margin-top:14px">📋 Pending Withdrawals ('+wds.length+')</h3>'+wds.map(function(w){var isBank=w.type==='bank';var dh=isBank?'<div style="font-size:12px;color:#b3b3b3;">🏦 '+esc(w.bank_name)+' | Acct: '+esc(w.account_number)+' | '+esc(w.account_holder)+'</div>':'<div style="font-size:12px;color:#b3b3b3;">💎 '+esc(w.currency||'')+' → '+esc((w.wallet_address||'').substring(0,20))+'...</div>';var tl=isBank?'<span class="badge bank_withdraw">Bank</span>':'<span class="badge withdraw">Crypto</span>';return'<div style="background:var(--card);border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:10px;"><div style="font-size:14px;"><strong>User:</strong> '+esc(w.username)+' - <strong>'+fmtNaira(w.amount)+'</strong> '+tl+'</div>'+dh+'<div style="font-size:11px;color:#808080;">'+esc(w.created_at)+'</div><div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;"><button class="btn-green btn-sm" onclick="adminApproveWithdraw(\''+w.id+'\')">✅ Approve & Auto-Payout</button><button class="btn-red btn-sm" onclick="adminDeclineWithdraw(\''+w.id+'\')">❌ Decline</button></div></div>'}).join('')}

async function renderAdminPendingPayouts(){var el=document.getElementById('adminPendingPayouts');if(!el)return;var{data:wds}=await supabaseAdmin.from('withdrawals').select('*').eq('status','pending').order('created_at',{ascending:false});if(!wds||!wds.length){el.innerHTML='<p style="color:#808080;">No pending withdrawals.</p>';return}el.innerHTML=wds.map(function(w){var isBank=w.type==='bank';var dh=isBank?'🏦 '+esc(w.bank_name)+' | '+esc(w.account_number)+' ('+esc(w.account_holder)+')':'💎 '+esc(w.currency)+' → '+esc((w.wallet_address||'').substring(0,20))+'...';return'<div style="background:var(--card);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:8px;"><div><strong>'+esc(w.username)+'</strong> — '+fmtNaira(w.amount)+' '+(isBank?'<span class="badge bank_withdraw">Bank</span>':'<span class="badge withdraw">Crypto</span>')+'</div><div style="font-size:12px;color:#b3b3b3;">'+dh+'</div><div style="font-size:11px;color:#808080;">'+esc(w.created_at)+'</div><div style="margin-top:6px;display:flex;gap:6px;"><button class="btn-green btn-sm" onclick="adminApproveWithdraw(\''+w.id+'\')">✅ Approve & Pay</button><button class="btn-red btn-sm" onclick="adminDeclineWithdraw(\''+w.id+'\')">❌ Decline</button></div></div>'}).join('')}

async function adminSetStatus(un){var s=document.getElementById('userStatus_'+un).value;await supabaseAdmin.from('profiles').update({status:s}).eq('username',un);refreshAdminData()}
async function adminAddBalance(un){var amt=prompt('Add NGN to '+un+':');if(!amt||isNaN(amt)||parseFloat(amt)<=0)return;amt=parseFloat(amt);var{data:p}=await supabaseAdmin.from('profiles').select('balance,invested').eq('username',un).single();if(!p)return;await supabaseAdmin.from('profiles').update({balance:p.balance+amt,invested:p.invested+amt}).eq('username',un);await supabaseAdmin.from('transactions').insert({username:un,type:'deposit',amount:amt,description:'Admin credit',created_at:nowString()});refreshAdminData()}
async function adminDeductBalance(un){var amt=prompt('Deduct NGN from '+un+':');if(!amt||isNaN(amt)||parseFloat(amt)<=0)return;amt=parseFloat(amt);var{data:p}=await supabaseAdmin.from('profiles').select('balance').eq('username',un).single();if(!p||amt>p.balance){alert('Insufficient balance.');return}await supabaseAdmin.from('profiles').update({balance:p.balance-amt}).eq('username',un);await supabaseAdmin.from('transactions').insert({username:un,type:'withdraw',amount:amt,description:'Admin deduction',created_at:nowString()});refreshAdminData()}
async function adminDeleteUser(un){if(!confirm('⚠️ PERMANENTLY DELETE '+un+'? This cannot be undone!'))return;if(!confirm('Are you absolutely sure?'))return;await supabaseAdmin.from('profiles').delete().eq('username',un);await supabaseAdmin.from('transactions').delete().eq('username',un);await supabaseAdmin.from('withdrawals').delete().eq('username',un);await supabaseAdmin.from('referrals').delete().eq('referrer',un);refreshAdminData();alert('User '+un+' deleted.')}
async function adminApproveWithdraw(wdId){var{data:w}=await supabaseAdmin.from('withdrawals').select('*').eq('id',wdId).single();if(!w)return;if(!confirm('Approve '+fmtNaira(w.amount)+' withdrawal for '+w.username+'?'))return;var ref='NZ-PAY-'+Date.now()+'-'+Math.random().toString(36).substring(2,6).toUpperCase();await supabaseAdmin.from('withdrawals').update({status:'approved',approved_at:new Date().toISOString(),payout_ref:ref}).eq('id',wdId);if(w.type==='bank'){var ak=_settings&&_settings.monnify_api_key,sk=_settings&&_settings.monnify_secret_key,src=_settings&&_settings.monnify_source_account;if(ak&&sk&&src&&w.bank_code&&w.account_number){var basicAuth=btoa(ak+':'+sk);try{var authRes=await fetch('https://sandbox.monnify.com/api/v1/auth/login',{method:'POST',headers:{'Authorization':'Basic '+basicAuth}}).then(function(r){return r.json()});if(!authRes||!authRes.responseBody||!authRes.responseBody.accessToken){await supabaseAdmin.from('withdrawals').update({payout_status:'auth_failed'}).eq('id',wdId);refreshAdminData();alert('Monnify auth failed.');return}var token=authRes.responseBody.accessToken;var payoutRes=await fetch('https://sandbox.monnify.com/api/v2/disbursements/single',{method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({amount:w.amount,reference:ref,narration:'NetflixZone payout to '+w.username,destinationBankCode:w.bank_code,destinationAccountNumber:w.account_number,sourceAccountNumber:src,currency:'NGN'})}).then(r=>r.json());if(payoutRes&&payoutRes.requestSuccessful){await supabaseAdmin.from('withdrawals').update({payout_status:'paid',payout_response:JSON.stringify(payoutRes)}).eq('id',wdId);alert('✅ Bank payout initiated! Ref: '+ref)}else{await supabaseAdmin.from('withdrawals').update({payout_status:'payout_failed',payout_error:payoutRes?JSON.stringify(payoutRes):'Unknown'}).eq('id',wdId);alert('Monnify payout failed.')}}catch(err){await supabaseAdmin.from('withdrawals').update({payout_status:'error',payout_error:err.message}).eq('id',wdId);alert('Error: '+err.message)}}else{alert('Monnify not fully configured.')}}else{var npKey=_settings&&_settings.np_api_key,npEmail=_settings&&_settings.np_email,npPass=_settings&&_settings.np_password;if(npKey&&npEmail&&npPass&&w.wallet_address&&w.currency){var curMap={'USDT (TRC20)':'usdttrc20','Bitcoin (BTC)':'btc','Ethereum (ETH)':'eth','Tron (TRX)':'trx','Litecoin (LTC)':'ltc','Dogecoin (DOGE)':'doge','Solana (SOL)':'sol'};var pc=curMap[w.currency]||w.currency.toLowerCase().replace(/[^a-z0-9]/g,'');try{var authRes=await fetch('https://api.nowpayments.io/v1/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:npEmail,password:npPass})}).then(r=>r.json());var jwt=authRes&&authRes.token;if(!jwt){await supabaseAdmin.from('withdrawals').update({payout_status:'auth_failed'}).eq('id',wdId);refreshAdminData();alert('NOWPayments auth failed.');return}var payoutRes=await fetch('https://api.nowpayments.io/v1/payout',{method:'POST',headers:{'x-api-key':npKey,'Content-Type':'application/json','Authorization':'Bearer '+jwt},body:JSON.stringify({withdrawals:[{address:w.wallet_address,currency:pc,amount:parseFloat(w.amount)}],payout_description:'NetflixZone withdrawal for '+w.username})}).then(r=>r.json());if(payoutRes&&payoutRes.id){await supabaseAdmin.from('withdrawals').update({payout_status:'paid',payout_response:JSON.stringify(payoutRes),payout_ref:ref}).eq('id',wdId);alert('✅ Crypto payout initiated! Payout ID: '+payoutRes.id)}else{await supabaseAdmin.from('withdrawals').update({payout_status:'payout_failed',payout_error:payoutRes?JSON.stringify(payoutRes):'Unknown'}).eq('id',wdId);alert('NOWPayments payout failed.')}}catch(err){await supabaseAdmin.from('withdrawals').update({payout_status:'error',payout_error:err.message}).eq('id',wdId);alert('Error: '+err.message)}}else{alert('NOWPayments not configured.')}}refreshAdminData()}
async function adminDeclineWithdraw(wdId){var{data:w}=await supabaseAdmin.from('withdrawals').select('*').eq('id',wdId).single();if(!w)return;if(!confirm('Decline withdrawal for '+w.username+'? Balance will be refunded.'))return;var{data:p}=await supabaseAdmin.from('profiles').select('balance').eq('username',w.username).single();if(p)await supabaseAdmin.from('profiles').update({balance:p.balance+w.amount}).eq('username',w.username);await supabaseAdmin.from('withdrawals').update({status:'declined'}).eq('id',wdId);refreshAdminData()}
async function adminSaveAssetRates(){await loadSettings();var rates=_settings.asset_rates||{};for(var aid in ASSET_TYPES){var val=parseFloat(document.getElementById('adminAssetRate_'+aid).value);if(!isNaN(val)&&val>=0)rates[aid]=val}await supabaseAdmin.from('settings').update({asset_rates:rates}).eq('id',1);_settings.asset_rates=rates;document.getElementById('assetRateMsg')&&(document.getElementById('assetRateMsg').textContent='Asset rates saved!');setTimeout(function(){document.getElementById('assetRateMsg')&&(document.getElementById('assetRateMsg').textContent='')},3000);renderAssetRatesGrid()}
async function adminUpdateMinAmounts(){var d=parseFloat(document.getElementById('adminMinDeposit').value),w=parseFloat(document.getElementById('adminMinWithdraw').value);if(isNaN(d)||d<100||isNaN(w)||w<100)return;await supabaseAdmin.from('settings').update({min_deposit:d,min_withdraw:w}).eq('id',1);_settings.min_deposit=d;_settings.min_withdraw=w;refreshAdminData();document.getElementById('adminActionMsg')&&(document.getElementById('adminActionMsg').textContent='Min deposit: '+fmtNaira(d)+' | Min withdraw: '+fmtNaira(w))}
async function adminUpdateWithdrawDay(){var day=parseInt(document.getElementById('adminWithdrawDay').value);await supabaseAdmin.from('settings').update({withdraw_day:day}).eq('id',1);_settings.withdraw_day=day;refreshAdminData();document.getElementById('adminActionMsg')&&(document.getElementById('adminActionMsg').textContent='Withdrawal day: '+wdName(day))}
async function adminSaveMonnifyKeys(){var api=document.getElementById('adminMonnifyApiKey').value.trim(),cc=document.getElementById('adminMonnifyContractCode').value.trim(),sk=document.getElementById('adminMonnifySecretKey').value.trim(),src=document.getElementById('adminMonnifySourceAccount').value.trim();await supabaseAdmin.from('settings').update({monnify_api_key:api,monnify_contract_code:cc,monnify_secret_key:sk,monnify_source_account:src}).eq('id',1);_settings.monnify_api_key=api;_settings.monnify_contract_code=cc;_settings.monnify_secret_key=sk;_settings.monnify_source_account=src;document.getElementById('monnifyMsg')&&(document.getElementById('monnifyMsg').textContent='Monnify keys saved!');setTimeout(function(){document.getElementById('monnifyMsg')&&(document.getElementById('monnifyMsg').textContent='')},3000)}
async function adminSaveNPKeys(){var apik=document.getElementById('adminNPApiKey').value.trim(),em=document.getElementById('adminNPEmail').value.trim(),pw=document.getElementById('adminNPPassword').value.trim();await supabaseAdmin.from('settings').update({np_api_key:apik,np_email:em,np_password:pw}).eq('id',1);_settings.np_api_key=apik;_settings.np_email=em;_settings.np_password=pw;document.getElementById('npMsg')&&(document.getElementById('npMsg').textContent='NOWPayments keys saved!');setTimeout(function(){document.getElementById('npMsg')&&(document.getElementById('npMsg').textContent='')},3000)}
async function adminCreateUser(){var u=document.getElementById('adminNewUser').value.trim(),p=document.getElementById('adminNewPass').value.trim(),n=document.getElementById('adminNewName').value.trim();if(!u||!p||!n){document.getElementById('adminCreateMsg').textContent='Fill all fields.';return}var{data:ex}=await supabaseAdmin.from('profiles').select('username').eq('username',u).single();if(ex){document.getElementById('adminCreateMsg').textContent='Already exists.';return}await supabaseAdmin.from('profiles').insert({username:u,full_name:n,email:u+'@netflixzone.local',phone:'',password:p,balance:0,invested:0,profit:0,referral_bonus:0,referral_code:u,referred_by:'',plan:'Basic',status:'active',asset:'metallic',last_asset_switch:'',last_interest_date:''});document.getElementById('adminCreateMsg').textContent='Created user: '+u;['adminNewUser','adminNewPass','adminNewName'].forEach(function(i){document.getElementById(i).value=''});refreshAdminData()}
async function changeAdminPassword(){var cur=document.getElementById('adminCurrentPass').value,nw=document.getElementById('adminNewPassInput').value;if(!cur||!nw){document.getElementById('changePassMsg').textContent='Fill both fields.';return}var{data:a}=await supabaseAdmin.from('admin').select('password').single();if(a.password!==cur){document.getElementById('changePassMsg').textContent='Current password wrong.';return}await supabaseAdmin.from('admin').update({password:nw}).eq('id',1);document.getElementById('changePassMsg').textContent='Changed.';document.getElementById('adminCurrentPass').value='';document.getElementById('adminNewPassInput').value=''}
async function adminResetUserPassword(){var u=document.getElementById('adminResetUser').value.trim(),p=document.getElementById('adminResetUserPass').value.trim();if(!u||!p){document.getElementById('resetUserPassMsg').textContent='Fill both.';return}var{data:ex}=await supabaseAdmin.from('profiles').select('username').eq('username',u).single();if(!ex){document.getElementById('resetUserPassMsg').textContent='User not found.';return}await supabaseAdmin.from('profiles').update({password:p}).eq('username',u);document.getElementById('resetUserPassMsg').textContent='Password reset for '+u;document.getElementById('adminResetUser').value='';document.getElementById('adminResetUserPass').value=''}
async function adminPayAllProfits(){if(!confirm('Apply daily interest to ALL active users?'))return;await loadSettings();var today=todayDateString(),count=0;var{data:profiles}=await supabaseAdmin.from('profiles').select('*').eq('status','active').gt('balance',0);if(!profiles)profiles=[];for(var i=0;i<profiles.length;i++){var u=profiles[i];if(u.last_interest_date===today)continue;var rate=getUserInterestRate(u),interest=u.balance*(rate/100);await supabaseAdmin.from('profiles').update({balance:u.balance+interest,profit:u.profit+interest,last_interest_date:today}).eq('username',u.username);var ai=getAssetInfo(u.asset||'metallic');await supabaseAdmin.from('transactions').insert({username:u.username,type:'profit',amount:interest,description:ai.icon+' '+ai.name+' interest '+rate+'%',created_at:nowString()});count++}document.getElementById('adminActionMsg')&&(document.getElementById('adminActionMsg').textContent='Applied to '+count+' users.');refreshAdminData()}
async function adminResetAll(){if(!confirm('WIPE ALL USER DATA? This cannot be undone!'))return;if(!confirm('Are you sure? All users, transactions, and balances will be deleted.'))return;await supabaseAdmin.from('profiles').delete().neq('username','__nonexistent__');await supabaseAdmin.from('transactions').delete().neq('username','__nonexistent__');await supabaseAdmin.from('withdrawals').delete().neq('username','__nonexistent__');await supabaseAdmin.from('referrals').delete().neq('referrer','__nonexistent__');document.getElementById('adminActionMsg')&&(document.getElementById('adminActionMsg').textContent='Data reset.');refreshAdminData()}
async function adminBroadcast(){var msg=document.getElementById('broadcastMessage').value.trim();if(!msg){document.getElementById('broadcastMsg').textContent='Enter a message.';return}var{data:profiles}=await supabaseAdmin.from('profiles').select('email');if(!profiles)return;var count=profiles.length;document.getElementById('broadcastMsg').textContent='Broadcast sent to '+count+' users.';document.getElementById('broadcastMessage').value=''}

(function boot(){loadSettings().then(function(){supabaseAdmin.from('admin').select('*').single().then(function(res){if(!res.data){supabaseAdmin.from('admin').insert({username:'admin',password:'admin123'}).then(function(){console.log('Admin user created with default credentials: admin/admin123')})}});if(!_settings){supabaseAdmin.from('settings').insert({id:1,min_deposit:1000,min_withdraw:500,withdraw_day:5,asset_rates:'{"metallic":2.0,"energy":3.0,"gemstone":4.0}',monnify_api_key:'',monnify_contract_code:'',monnify_secret_key:'',monnify_source_account:'',np_api_key:'',np_secret_key:'',np_email:'',np_password:''}).then(function(){loadSettings(true)})}else{var session=getSession();if(session&&session.username){if(session.isAdmin&&session.username==='admin'){isAdminLoggedIn=true;currentUser='admin';currentUserData=null;enterDashboard('admin')}else{supabaseAdmin.from('profiles').select('*').eq('username',session.username).single().then(function(res){if(res.data&&res.data.status!=='closed'){currentUser=session.username;currentUserData=res.data;isAdminLoggedIn=false;applyDailyInterest().then(function(){enterDashboard('user')})}else{clearSession()}})}}}})})();
</script>
